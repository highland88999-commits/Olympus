<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN | AXIOM 24</title>
    <style>
        :root { --fire: #ff4500; --spark: #ffae00; --bio-low: #001a33; --bio-high: #00f2ff; --cyan-bloom: rgba(0, 255, 255, 0.15); --cyan-border: rgba(0, 255, 255, 0.4); --cyan-glow: 0 0 20px rgba(0, 255, 255, 0.3); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        
        /* LANDING OVERLAY */
        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(0,26,51,0.5) 0%, #000 100%);
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 1s ease;
        }
        #landing-prompt {
            color: var(--bio-high); font-size: 1.2rem; letter-spacing: 8px;
            text-shadow: 0 0 20px var(--bio-high); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* UI ELEMENTS */
        header { position: relative; z-index: 100; height: 60px; display: none; opacity: 0; align-items: center; justify-content: space-between; padding: 0 20px; background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--bio-high); transition: opacity 1s; }
        h1 { letter-spacing: 5px; color: var(--bio-high); text-shadow: 0 0 15px var(--bio-high); font-size: 0.9rem; }

        #store-grid { 
            position: relative; z-index: 5; display: none; opacity: 0;
            grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 95%; margin: 15px auto 0 auto; 
            height: calc(100vh - 185px); 
            overflow-y: auto; scrollbar-width: none;
            padding-bottom: 10px; transition: opacity 1s;
        }

        .card { 
            position: relative; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.8 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px var(--bio-low); transition: 0.3s; backdrop-filter: blur(2px);
        }
        .card:hover { border-color: var(--bio-high); box-shadow: 0 0 20px var(--bio-high); }
        .card img { width: 85%; height: 85%; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 8px var(--bio-high)); }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,26,51,0.9); font-size: 0.55rem; text-align: center; padding: 6px 0; color: var(--bio-high); border-top: 1px solid var(--bio-high); }

        .control-footer {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: #000; z-index: 150; 
            display: none; opacity: 0; flex-direction: column; align-items: center; justify-content: center;
            border-top: 1px solid var(--bio-high);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.9); transition: opacity 1s;
        }

        #design-toggle { 
            position: absolute; left: 20px; bottom: 30px;
            padding: 10px 15px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--bio-high); 
            border-radius: 5px; color: var(--bio-high); cursor: pointer; display: flex; align-items: center; 
            gap: 8px; font-size: 0.65rem; text-transform: uppercase;
        }

        .slider-wrapper { width: 50%; margin-left: 100px; display: flex; flex-direction: column; align-items: center; }
        .sector-slider { width: 100%; accent-color: var(--bio-high); }
        #sector-display { font-size: 0.7rem; color: var(--bio-high); margin-bottom: 5px; letter-spacing: 2px; }

        /* MODALS & CART */
        #holoframe-container { position: fixed; top: 10%; left: 5%; width: 90%; height: 75%; z-index: 9999; display: none; opacity: 0; transform: scale(0.9); transition: all 0.4s ease; }
        .glass-frame { width: 100%; height: 100%; background: #000; border: 2px solid var(--bio-high); border-radius: 15px; box-shadow: 0 0 50px var(--bio-low); overflow: hidden; position: relative; }
        .close-holo { position: absolute; top: 15px; right: 20px; color: var(--bio-high); font-size: 2rem; cursor: pointer; z-index: 10001; }

        #modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 420px; background: #000; border: 2px solid var(--bio-high); position: relative; padding-bottom: 20px; }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 1.8rem; color: var(--bio-high); cursor: pointer; z-index: 100; }
        .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin: 15px 20px; }
        .size-btn { border: 1px solid var(--bio-high); background: #000; color: #fff; padding: 12px 0; cursor: pointer; font-size: 0.65rem; }
        .size-btn.selected { background: var(--bio-high); color: #000; font-weight: bold; }
        
        #side-cart { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #000; border-left: 1px solid var(--bio-high); z-index: 2000; transition: 0.4s; }
        #side-cart.open { right: 0; }
        .pay-link { display: block; width: 90%; margin: 10px auto; padding: 15px 0; text-align: center; font-size: 0.8rem; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body ondblclick="closeModal(); toggleCart(false)">

<div id="landing-overlay" onclick="enterSystem()">
    <div id="landing-prompt">SYSTEM READY // CLICK TO SYNC</div>
</div>

<header id="ui-header">
    <h1>OLYMPIAN // SOLAR CORE</h1>
    <div id="cart-trigger" onclick="toggleCart(true)" style="color:var(--bio-high); border:1px solid var(--bio-high); padding:8px 15px; font-size:0.8rem; cursor:pointer;">MANIFEST (0)</div>
</header>

<div id="store-grid"></div>

<div class="control-footer" id="ui-footer">
    <button id="design-toggle" onclick="toggleHoloframe()">
        <span>Custom Design</span>
    </button>
    <div class="slider-wrapper">
        <div id="sector-display">SYNCING...</div>
        <input type="range" id="sector-slider" class="sector-slider" min="1" max="1" value="1">
    </div>
</div>

<div id="holoframe-container">
    <span class="close-holo" onclick="toggleHoloframe()">×</span>
    <div class="glass-frame">
        <iframe src="https://georgia-aquarium.vercel.app/" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div id="modal-img-container" style="padding:10px;"></div>
        <div style="padding:0 20px;">
            <div id="modal-title" style="color:var(--bio-high); font-size:0.8rem; margin-bottom:10px; text-transform:uppercase; text-align:center;"></div>
            <div class="size-grid">
                <button class="size-btn" onclick="selectSize(this, 'S')">S</button>
                <button class="size-btn" onclick="selectSize(this, 'M')">M</button>
                <button class="size-btn" onclick="selectSize(this, 'L')">L</button>
                <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
                <button class="size-btn" onclick="selectSize(this, '2XL')">2XL</button>
            </div>
            <button onclick="addToCart()" style="width:100%; padding:15px; background:var(--bio-high); border:none; font-weight:bold; cursor:pointer; color:#000;">UPLOAD TO MANIFEST</button>
        </div>
    </div>
</div>

<div id="side-cart">
    <div style="padding:20px; border-bottom:1px solid var(--bio-high); display:flex; justify-content:space-between;"><span style="color:var(--bio-high)">MANIFEST</span><span onclick="toggleCart(false)" style="cursor:pointer;">×</span></div>
    <div id="cart-items" style="padding:20px; font-size:0.7rem;"></div>
    <div style="position:absolute; bottom:20px; width:100%;">
        <a href="https://buy.stripe.com/4gMaEWdE3dha4GUgBAcIE01" class="pay-link" style="background:#fff; color:#000;" target="_blank">STRIPE</a>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
    import * as THREE from 'three';

    // GLOBAL STORE LOGIC (Merged)
    window.allProducts = []; 
    window.cart = []; 
    window.itemsPerPage = 24; 
    window.selectedSize = null; 
    window.activeProduct = null;

    // SOLAR ENGINE INITIALIZATION
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const textureLoader = new THREE.TextureLoader();
    const geometry = new THREE.SphereGeometry(100, 64, 64);
    const material = new THREE.MeshStandardMaterial({
        map: textureLoader.load('1000000142.jpg'),
        metalness: 0.1,
        roughness: 0.8,
        emissive: new THREE.Color(0xff8800),
        emissiveIntensity: 0.8
    });
    const sun = new THREE.Mesh(geometry, material);
    scene.add(sun);

    const pointLight = new THREE.PointLight(0xffffff, 3, 500);
    scene.add(pointLight);
    const ambientLight = new THREE.AmbientLight(0x404040, 1);
    scene.add(ambientLight);

    camera.position.z = 250;
    camera.position.y = 50;
    camera.lookAt(0,0,0);

    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.002;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // UI CONTROLS
    window.enterSystem = function() {
        const overlay = document.getElementById('landing-overlay');
        document.getElementById('landing-prompt').innerText = "SYNCING SOLAR CORE...";
        overlay.style.opacity = '0';
        setTimeout(() => {
            overlay.style.display = 'none';
            ['ui-header', 'store-grid', 'ui-footer'].forEach(id => {
                const el = document.getElementById(id);
                el.style.display = (id === 'store-grid') ? 'grid' : 'flex';
                setTimeout(() => el.style.opacity = '1', 50);
            });
            fetchStore();
        }, 1000);
    };

    async function fetchStore() {
        try {
            const res = await fetch('/api/artemis-2.js');
            const data = await res.json();
            if (data.products) { 
                window.allProducts = data.products; 
                setupNavigation();
                renderGrid(1); 
            }
        } catch (e) { document.getElementById('sector-display').innerText = "LINK SEVERED"; }
    }

    function setupNavigation() {
        const slider = document.getElementById('sector-slider');
        const display = document.getElementById('sector-display');
        const totalPages = Math.ceil(window.allProducts.length / window.itemsPerPage);
        slider.max = totalPages;
        display.innerText = `SECTOR 01 / ${totalPages.toString().padStart(2, '0')}`;
        slider.oninput = (e) => {
            display.innerText = `SECTOR ${e.target.value.padStart(2, '0')} / ${totalPages.toString().padStart(2, '0')}`;
            renderGrid(parseInt(e.target.value));
        };
    }

    function renderGrid(page) {
        const grid = document.getElementById('store-grid');
        const start = (page - 1) * window.itemsPerPage;
        const items = window.allProducts.slice(start, start + window.itemsPerPage);
        grid.innerHTML = items.map(p => `
            <div class="card" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
                <div class="grid-label">${p.name.split('Prompt:')[1] || 'OLYMPIAN'}</div>
            </div>`).join('');
        grid.scrollTop = 0;
    }

    window.openModal = function(name, img) {
        window.activeProduct = { name, img }; window.selectedSize = null;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; mix-blend-mode:screen; filter:drop-shadow(0 0 15px var(--bio-high));">`;
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.selectSize = function(btn, size) { 
        window.selectedSize = size; 
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected')); 
        btn.classList.add('selected'); 
    };

    window.closeModal = function() { document.getElementById('modal-overlay').style.display = 'none'; };
    window.toggleCart = function(show) { document.getElementById('side-cart').classList.toggle('open', show); };
    window.toggleHoloframe = function() {
        const frame = document.getElementById('holoframe-container');
        if (frame.style.display === 'block') {
            frame.style.opacity = '0';
            setTimeout(() => { frame.style.display = 'none'; }, 400);
        } else {
            frame.style.display = 'block';
            setTimeout(() => { frame.style.opacity = '1'; }, 10);
        }
    };

    window.addToCart = function() {
        if(!window.selectedSize) return alert("SELECT SIZE");
        window.cart.push({...window.activeProduct, size: window.selectedSize});
        document.getElementById('cart-trigger').innerText = `MANIFEST (${window.cart.length})`;
        document.getElementById('cart-items').innerHTML = window.cart.map(i => `<div style="padding:10px; border-bottom:1px solid #111;">${i.name}<br><span style="color:var(--bio-high)">${i.size}</span></div>`).join('');
        window.closeModal(); window.toggleCart(true);
    };
</script>
</body>
</html>
