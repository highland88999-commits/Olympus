<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN | DEEP SPACE</title>
    <style>
        :root { 
            --fire: #ff4500; 
            --spark: #ffae00; 
            --bio-low: #001a33; 
            --bio-high: #00f2ff; 
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', monospace; 
            color: white; overflow: hidden; 
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; }

        /* HEADER */
        header { 
            position: relative; z-index: 100; height: 65px; display: none; opacity: 0; 
            align-items: center; justify-content: space-between; padding: 0 20px; 
            background: var(--ui-bg); border-bottom: 1px solid var(--bio-high); 
            transition: opacity 0.5s ease; 
        }
        h1 { letter-spacing: 4px; color: var(--bio-high); text-shadow: 0 0 10px var(--bio-high); font-size: 0.85rem; }

        /* GRID */
        #store-grid { 
            position: relative; z-index: 5; display: none; opacity: 0;
            grid-template-columns: repeat(2, 1fr); gap: 12px; 
            width: 92%; margin: 15px auto 0 auto; 
            height: calc(100vh - 180px); 
            overflow-y: auto; scrollbar-width: none;
            padding-bottom: 5px; 
            transition: opacity 0.5s ease;
        }
        #store-grid::-webkit-scrollbar { display: none; }

        .card { 
            position: relative; background: rgba(0, 242, 255, 0.02); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.85 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(4px); transition: 0.3s;
        }
        .card:hover { border-color: var(--bio-high); box-shadow: 0 0 15px var(--bio-high); }
        .card img { width: 90%; height: 90%; object-fit: contain; mix-blend-mode: screen; }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,26,51,0.95); font-size: 0.5rem; text-align: center; padding: 5px 0; color: var(--bio-high); border-top: 1px solid var(--bio-high); letter-spacing: 1px; }

        /* REBALANCED FOOTER */
        .control-footer {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: var(--ui-bg); z-index: 150; 
            display: none; opacity: 0; align-items: center; justify-content: space-between;
            border-top: 1px solid var(--bio-high); padding: 0 15px; box-sizing: border-box;
            transition: all 0.5s ease;
        }

        .footer-btn {
            height: 45px; padding: 0 12px; background: rgba(0, 242, 255, 0.05); 
            border: 1px solid var(--bio-high); color: var(--bio-high); 
            font-size: 0.65rem; font-family: inherit; letter-spacing: 1px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
            text-transform: uppercase; transition: 0.3s;
        }
        .footer-btn:active { transform: scale(0.95); background: var(--bio-high); color: #000; }
        .footer-btn.active { background: var(--bio-high); color: #000; box-shadow: 0 0 15px var(--bio-high); }

        .center-controls {
            flex-grow: 1; max-width: 40%; display: flex; flex-direction: column; align-items: center; gap: 8px;
            transition: opacity 0.5s;
        }
        #sector-display { font-size: 0.6rem; color: var(--bio-high); letter-spacing: 2px; }
        .sector-slider { width: 100%; accent-color: var(--bio-high); cursor: pointer; }

        /* MODALS & SIZES */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; display: none; background: rgba(0,0,0,0.96); backdrop-filter: blur(15px); align-items: center; justify-content: center; }
        .modal-content { width: 92%; max-width: 400px; background: #000; border: 1px solid var(--bio-high); padding: 20px 0; position: relative; }
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 20px; }
        .size-btn { border: 1px solid var(--bio-high); background: transparent; color: #fff; padding: 12px 0; cursor: pointer; font-size: 0.6rem; transition: 0.2s; }
        .size-btn.selected { background: var(--bio-high); color: #000; font-weight: bold; }

        #side-cart { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #000; border-left: 1px solid var(--bio-high); z-index: 2000; transition: 0.4s; }
        #side-cart.open { right: 0; }
    </style>
</head>
<body ondblclick="window.closeModal(); window.toggleCart(false)">

<header id="ui-header">
    <h1>OLYMPIAN // DEEP SPACE</h1>
    <div id="cart-trigger" onclick="window.toggleCart(true)" style="border:1px solid var(--bio-high); color:var(--bio-high); padding:10px 15px; font-size:0.7rem; cursor:pointer;">MANIFEST (0)</div>
</header>

<div id="store-grid"></div>

<div class="control-footer" id="ui-footer">
    <button class="footer-btn" id="design-toggle" onclick="window.toggleHoloframe()">CUSTOM</button>
    
    <div class="center-controls" id="center-ui">
        <div id="sector-display">SYNCING...</div>
        <input type="range" id="sector-slider" class="sector-slider" min="1" max="1" value="1">
    </div>

    <button class="footer-btn" id="interactive-toggle" onclick="window.toggleInteractive()">
        INTERACTIVE 🪐
    </button>
</div>

<div id="modal-overlay" onclick="window.closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-img-container" style="padding:10px; text-align:center;"></div>
        <div id="modal-title" style="color:var(--bio-high); font-size:0.75rem; text-align:center; padding:10px; letter-spacing:1px;"></div>
        <div class="size-grid">
            <button class="size-btn" onclick="window.selectSize(this, '3XS')">3XS</button>
            <button class="size-btn" onclick="window.selectSize(this, '2XS')">2XS</button>
            <button class="size-btn" onclick="window.selectSize(this, 'XS')">XS</button>
            <button class="size-btn" onclick="window.selectSize(this, 'S')">S</button>
            <button class="size-btn" onclick="window.selectSize(this, 'M')">M</button>
            <button class="size-btn" onclick="window.selectSize(this, 'L')">L</button>
            <button class="size-btn" onclick="window.selectSize(this, 'XL')">XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '2XL')">2XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '3XL')">3XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '4XL')">4XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '5XL')">5XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '6XL')">6XL</button>
        </div>
        <button onclick="window.addToCart()" style="width:90%; margin:10px 5%; padding:15px; background:var(--bio-high); border:none; font-weight:bold; cursor:pointer; color:#000;">UPLOAD TO MANIFEST</button>
    </div>
</div>

<div id="side-cart">
    <div style="padding:20px; border-bottom:1px solid var(--bio-high); display:flex; justify-content:space-between; color:var(--bio-high)">
        <span>MANIFEST</span><span onclick="window.toggleCart(false)" style="cursor:pointer;">×</span>
    </div>
    <div id="cart-items" style="padding:20px; font-size:0.7rem;"></div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    window.allProducts = []; 
    window.cart = []; 
    window.itemsPerPage = 24; 
    window.isInteractive = false;

    // --- COSMOS ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    const textureLoader = new THREE.TextureLoader();
    
    // Background Restore
    const bgTexture = textureLoader.load('8k_stars_milky_way.jpg');
    scene.background = bgTexture;

    // Enhanced Star Field (Former Glory)
    const starGeo = new THREE.BufferGeometry();
    const starCoords = [];
    for (let i = 0; i < 15000; i++) {
        starCoords.push((Math.random() - 0.5) * 8000, (Math.random() - 0.5) * 8000, (Math.random() - 0.5) * 8000);
    }
    starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starCoords, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, transparent: true, opacity: 0.9 });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    const systemGroup = new THREE.Group();
    scene.add(systemGroup);

    const planets = [];

    function createPlanet(name, size, textureFile, distance, orbitSpeed, hasRings = false) {
        const geometry = new THREE.SphereGeometry(size, 64, 64);
        const material = new THREE.MeshStandardMaterial({ 
            map: textureLoader.load(textureFile), 
            metalness: 0.3, 
            roughness: 0.8 
        });
        const planet = new THREE.Mesh(geometry, material);
        const orbitData = { mesh: planet, distance, speed: orbitSpeed, angle: Math.random() * Math.PI * 2 };
        
        if (hasRings) {
            const ringGeo = new THREE.RingGeometry(size * 1.5, size * 2.5, 64);
            const ringMat = new THREE.MeshBasicMaterial({ map: textureLoader.load('8k_saturn_ring_alpha.png'), side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            const rings = new THREE.Mesh(ringGeo, ringMat);
            rings.rotation.x = Math.PI / 2; planet.add(rings);
        }
        systemGroup.add(planet);
        planets.push(orbitData);
        return planet;
    }

    // Solar Core
    const sun = createPlanet("Sun", 70, '1000000142.jpg', 0, 0);
    sun.material.emissive = new THREE.Color(0xff4500);
    sun.material.emissiveIntensity = 2.0;

    createPlanet("Mercury", 6, '1000000128.jpg', 160, 0.015);
    createPlanet("Venus", 12, '1000000129.jpg', 240, 0.01);
    createPlanet("Earth", 13, '8k_earth_daymap.jpg', 350, 0.008);
    createPlanet("Mars", 9, '1000000131.jpg', 460, 0.006);
    createPlanet("Jupiter", 40, '1000000132.jpg', 650, 0.004);
    createPlanet("Saturn", 35, '1000000133.jpg', 900, 0.002, true);
    createPlanet("Uranus", 22, '2k_uranus.jpg', 1200, 0.001);
    createPlanet("Neptune", 22, '2k_neptune.jpg', 1450, 0.0008);

    const sunLight = new THREE.PointLight(0xffffff, 10, 4000);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.4));

    camera.position.set(0, 1000, 2500);
    camera.lookAt(0,0,0);

    function animate() {
        requestAnimationFrame(animate);
        const t = Date.now() * 0.001;
        
        planets.forEach(p => {
            if(p.distance > 0) {
                p.angle += p.speed;
                p.mesh.position.x = Math.cos(p.angle) * p.distance;
                p.mesh.position.z = Math.sin(p.angle) * p.distance;
            }
            p.mesh.rotation.y += 0.005;
        });

        sun.material.emissiveIntensity = 1.5 + Math.sin(t * 2) * 0.5;
        stars.rotation.y += 0.0001;
        
        if (controls.enabled) controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- UI CONTROLS ---
    window.toggleInteractive = function() {
        window.isInteractive = !window.isInteractive;
        const uiElements = [document.getElementById('ui-header'), document.getElementById('store-grid'), document.getElementById('center-ui'), document.getElementById('design-toggle')];
        const btn = document.getElementById('interactive-toggle');
        const footer = document.getElementById('ui-footer');

        if (window.isInteractive) {
            uiElements.forEach(el => el.classList.add('ui-hidden'));
            btn.classList.add('active');
            footer.style.background = 'transparent';
            footer.style.border = 'none';
            controls.enabled = true;
        } else {
            uiElements.forEach(el => el.classList.remove('ui-hidden'));
            btn.classList.remove('active');
            footer.style.background = 'var(--ui-bg)';
            footer.style.borderTop = '1px solid var(--bio-high)';
            controls.enabled = false;
        }
    };

    // Initialize System
    setTimeout(() => {
        ['ui-header', 'store-grid', 'ui-footer'].forEach(id => {
            const el = document.getElementById(id);
            el.style.display = (id === 'store-grid') ? 'grid' : 'flex';
            setTimeout(() => el.style.opacity = '1', 50);
        });
        fetchStore();
    }, 100);

    async function fetchStore() {
        try {
            const res = await fetch('/api/artemis-2.js');
            const data = await res.json();
            if (data.products) { 
                window.allProducts = data.products; 
                setupNavigation();
                renderGrid(1); 
            }
        } catch (e) { document.getElementById('sector-display').innerText = "OFFLINE"; }
    }

    function setupNavigation() {
        const slider = document.getElementById('sector-slider');
        const totalPages = Math.ceil(window.allProducts.length / window.itemsPerPage);
        slider.max = totalPages;
        slider.oninput = (e) => {
            document.getElementById('sector-display').innerText = `SECTOR ${e.target.value.padStart(2, '0')} / ${totalPages.toString().padStart(2, '0')}`;
            renderGrid(parseInt(e.target.value));
        };
    }

    function renderGrid(page) {
        const grid = document.getElementById('store-grid');
        const items = window.allProducts.slice((page - 1) * window.itemsPerPage, page * window.itemsPerPage);
        grid.innerHTML = items.map(p => `
            <div class="card" onclick="window.openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
                <div class="grid-label">${p.name.split('Prompt:')[1] || 'OLYMPIAN'}</div>
            </div>`).join('');
    }

    window.openModal = function(name, img) {
        window.activeProduct = { name, img }; window.selectedSize = null;
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; max-height:300px; object-fit:contain; mix-blend-mode:screen;">`;
        document.getElementById('modal-overlay').style.display = 'flex';
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
    };

    window.selectSize = function(btn, size) { 
        window.selectedSize = size; 
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected')); 
        btn.classList.add('selected'); 
    };

    window.closeModal = function() { document.getElementById('modal-overlay').style.display = 'none'; };
    window.toggleCart = function(show) { document.getElementById('side-cart').classList.toggle('open', show); };

    window.addToCart = function() {
        if(!window.selectedSize) return alert("SELECT SIZE");
        window.cart.push({...window.activeProduct, size: window.selectedSize});
        document.getElementById('cart-trigger').innerText = `MANIFEST (${window.cart.length})`;
        window.closeModal(); window.toggleCart(true);
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
