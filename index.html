<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // V1 CORE</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; color: var(--neon); font-family: 'Courier New', monospace; text-transform: uppercase; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; }
        header, footer { display: flex; justify-content: space-between; pointer-events: auto; }
        
        .btn-core { border: 1px solid var(--neon); background: rgba(0,0,0,0.5); color: var(--neon); padding: 12px 24px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px; backdrop-filter: blur(5px); transition: 0.3s; text-decoration: none; }
        .btn-core:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }
    </style>
</head>
<body>

<div id="ui-layer">
    <header>
        <div style="letter-spacing: 5px; font-weight: bold;">OLYMPIAN // HUB</div>
        <div id="manifest-count">MANIFEST (0)</div>
    </header>
    
    <footer>
        <a href="https://invite.kraken.com/JDNW/2yyr243k" target="_blank" class="btn-core">BTC REWARD</a>
        <button class="btn-core" onclick="toggleControls()">TOGGLE VIEWPORT 🪐</button>
    </footer>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // 1. CORE ENGINE & CENTERING
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 40000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    // Initial camera position centered on Sun (0,0,0)
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    camera.position.set(0, 2000, 5000);
    controls.target.set(0, 0, 0); // Centers system

    const loader = new THREE.TextureLoader();
    const assetPath = './assets/';

    // 2. UNIVERSAL BLOOM TIERS
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1; 
    bloomPass.strength = 1.4;
    bloomPass.radius = 0.7;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    const TIER = {
        SUN: { em: 0xffffff, int: 2.0 },
        BRIGHT: { em: 0x44ccff, int: 0.8 },
        PLANET: { em: 0x222222, int: 0.3 }
    };

    // 3. PROCEDURAL GALAXY (Centered)
    const starGeo = new THREE.BufferGeometry();
    const starCount = 15000;
    const posArray = new Float32Array(starCount * 3);
    for(let i=0; i < starCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 30000; }
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, sizeAttenuation: true }));
    scene.add(stars);

    // 4. THE SUN (TIER 1)
    const sun = new THREE.Mesh(
        new THREE.SphereGeometry(500, 64, 64),
        new THREE.MeshBasicMaterial({ map: loader.load(assetPath + '8k_sun.jpg') })
    );
    scene.add(sun);

    // 5. PLANETARY ENGINE (FULL REPO SYNC)
    const bodies = [];
    function spawn(size, tex, dist, speed, tier, ring = null) {
        const pivot = new THREE.Group();
        scene.add(pivot);
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(size, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: loader.load(assetPath + tex),
                emissive: new THREE.Color(tier.em),
                emissiveIntensity: tier.int
            })
        );
        mesh.position.x = dist;
        pivot.add(mesh);
        if(ring) {
            const r = new THREE.Mesh(new THREE.RingGeometry(size*1.8, size*3.2, 64), new THREE.MeshBasicMaterial({ map: loader.load(assetPath + ring), side: THREE.DoubleSide, transparent: true }));
            r.rotation.x = Math.PI/2;
            mesh.add(r);
        }
        bodies.push({ pivot, mesh, speed });
        return mesh;
    }

    // Centered distribution
    spawn(28, '8k_mercury.jpg', 900, 0.012, TIER.PLANET);
    spawn(60, '8k_venus_surface.jpg', 1350, 0.009, TIER.BRIGHT);
    const earth = spawn(70, '8k_earth_nightmap.jpg', 1900, 0.006, TIER.BRIGHT);
    const moon = new THREE.Mesh(new THREE.SphereGeometry(16, 32, 32), new THREE.MeshStandardMaterial({ map: loader.load(assetPath + '8k_moon.jpg'), emissive: 0xffffff, emissiveIntensity: 0.4 }));
    moon.position.x = 140; earth.add(moon);
    spawn(40, '8k_mars.jpg', 2500, 0.005, TIER.PLANET);
    spawn(180, '8k_jupiter.jpg', 3500, 0.002, TIER.PLANET);
    spawn(155, '8k_saturn.jpg', 4600, 0.001, TIER.PLANET, '8k_saturn_ring_alpha.png');
    spawn(95, '2k_uranus.jpg', 5600, 0.0007, TIER.PLANET);
    spawn(90, '2k_neptune.jpg', 6500, 0.0005, TIER.PLANET);

    scene.add(new THREE.PointLight(0xffffff, 10, 25000));
    scene.add(new THREE.AmbientLight(0xffffff, 0.05));

    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.001;
        stars.rotation.y += 0.00003;
        bodies.forEach(b => { 
            b.pivot.rotation.y += b.speed; 
            b.mesh.rotation.y += 0.004; 
        });
        controls.update();
        composer.render();
    }
    animate();

    window.toggleControls = () => {
        controls.enabled = !controls.enabled;
        document.getElementById('ui-layer').style.opacity = controls.enabled ? '0.3' : '1';
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
