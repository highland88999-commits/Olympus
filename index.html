<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN | AXIOM 24</title>
    <style>
        :root { 
            --fire: #ff4500; 
            --spark: #ffae00; 
            --bio-low: #001a33; 
            --bio-high: #00f2ff; 
            --cyan-glow: 0 0 20px rgba(0, 255, 255, 0.3); 
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', monospace; 
            color: white; overflow: hidden; 
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        
        /* UI VISIBILITY TOGGLE */
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; }

        /* LANDING OVERLAY */
        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: radial-gradient(circle, rgba(0,26,51,0.5) 0%, #000 100%);
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: opacity 1s ease;
        }
        #landing-prompt {
            color: var(--bio-high); font-size: 1.2rem; letter-spacing: 8px;
            text-shadow: 0 0 20px var(--bio-high); animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* UI ELEMENTS */
        header { 
            position: relative; z-index: 100; height: 60px; display: none; opacity: 0; 
            align-items: center; justify-content: space-between; padding: 0 20px; 
            background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--bio-high); 
            transition: opacity 0.5s ease; 
        }
        h1 { letter-spacing: 5px; color: var(--bio-high); text-shadow: 0 0 15px var(--bio-high); font-size: 0.9rem; }

        #store-grid { 
            position: relative; z-index: 5; display: none; opacity: 0;
            grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 95%; margin: 15px auto 0 auto; 
            height: calc(100vh - 160px - 2mm); 
            overflow-y: auto; scrollbar-width: none;
            padding-bottom: 2mm; 
            transition: opacity 0.5s ease;
        }
        #store-grid::-webkit-scrollbar { display: none; }

        .card { 
            position: relative; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.8 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px var(--bio-low); transition: 0.3s; backdrop-filter: blur(2px);
        }
        .card:hover { border-color: var(--bio-high); box-shadow: 0 0 20px var(--bio-high); }
        .card img { width: 85%; height: 85%; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 8px var(--bio-high)); }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,26,51,0.9); font-size: 0.55rem; text-align: center; padding: 6px 0; color: var(--bio-high); border-top: 1px solid var(--bio-high); }

        .control-footer {
            position: fixed; bottom: 0; width: 100%; height: 100px;
            background: #000; z-index: 150; 
            display: none; opacity: 0; align-items: center; justify-content: center;
            border-top: 1px solid var(--bio-high);
            box-shadow: 0 -10px 30px rgba(0,0,0,0.9); transition: opacity 0.5s ease;
        }

        #design-toggle { 
            position: absolute; left: 20px; bottom: 30px;
            padding: 10px 15px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--bio-high); 
            border-radius: 5px; color: var(--bio-high); cursor: pointer; display: flex; align-items: center; 
            gap: 8px; font-size: 0.65rem; text-transform: uppercase; transition: opacity 0.5s;
        }

        /* NEW INTERACTIVE BUTTON */
        #interactive-toggle {
            position: fixed; right: 20px; bottom: 30px; z-index: 500;
            padding: 10px 15px; background: rgba(0, 242, 255, 0.1); border: 1px solid var(--bio-high); 
            border-radius: 5px; color: var(--bio-high); cursor: pointer; display: flex; align-items: center; 
            gap: 8px; font-size: 0.65rem; text-transform: uppercase;
            box-shadow: 0 0 10px var(--bio-low);
        }
        #interactive-toggle.active { background: var(--bio-high); color: #000; box-shadow: 0 0 20px var(--bio-high); }

        .slider-wrapper { width: 40%; display: flex; flex-direction: column; align-items: center; transition: opacity 0.5s; }
        .sector-slider { width: 100%; accent-color: var(--bio-high); }
        #sector-display { font-size: 0.7rem; color: var(--bio-high); margin-bottom: 5px; letter-spacing: 2px; }

        /* MODALS & CART */
        #modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1000; display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 420px; background: #000; border: 2px solid var(--bio-high); position: relative; padding-bottom: 20px; }
        .size-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin: 15px 20px; }
        .size-btn { border: 1px solid var(--bio-high); background: #000; color: #fff; padding: 10px 0; cursor: pointer; font-size: 0.6rem; }
        .size-btn.selected { background: var(--bio-high); color: #000; font-weight: bold; }
        
        #side-cart { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #000; border-left: 1px solid var(--bio-high); z-index: 2000; transition: 0.4s; }
        #side-cart.open { right: 0; }
    </style>
</head>
<body ondblclick="window.closeModal(); window.toggleCart(false)">

<div id="landing-overlay" onclick="window.enterSystem()">
    <div id="landing-prompt">SYSTEM READY // CLICK TO SYNC</div>
</div>

<header id="ui-header">
    <h1>OLYMPIAN // DEEP SPACE</h1>
    <div id="cart-trigger" onclick="window.toggleCart(true)" style="color:var(--bio-high); border:1px solid var(--bio-high); padding:8px 15px; font-size:0.8rem; cursor:pointer;">MANIFEST (0)</div>
</header>

<div id="store-grid"></div>

<button id="interactive-toggle" onclick="window.toggleInteractive()">
    <span>INTERACTIVE</span> <span style="font-size:1.2rem">🪐</span>
</button>

<div class="control-footer" id="ui-footer">
    <button id="design-toggle" onclick="window.toggleHoloframe()" style="position:static; margin-right:auto; margin-left:20px;">
        <span>CUSTOM</span>
    </button>
    <div class="slider-wrapper" id="footer-slider-box">
        <div id="sector-display">SYNCING...</div>
        <input type="range" id="sector-slider" class="sector-slider" min="1" max="1" value="1">
    </div>
    <div style="width:100px;"></div> </div>

<div id="modal-overlay" onclick="window.closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-img-container" style="padding:10px;"></div>
        <div id="modal-title" style="color:var(--bio-high); font-size:0.7rem; text-align:center; text-transform:uppercase;"></div>
        <div class="size-grid">
            <button class="size-btn" onclick="window.selectSize(this, '3XS')">3XS</button>
            <button class="size-btn" onclick="window.selectSize(this, '2XS')">2XS</button>
            <button class="size-btn" onclick="window.selectSize(this, 'XS')">XS</button>
            <button class="size-btn" onclick="window.selectSize(this, 'S')">S</button>
            <button class="size-btn" onclick="window.selectSize(this, 'M')">M</button>
            <button class="size-btn" onclick="window.selectSize(this, 'L')">L</button>
            <button class="size-btn" onclick="window.selectSize(this, 'XL')">XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '2XL')">2XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '3XL')">3XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '4XL')">4XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '5XL')">5XL</button>
            <button class="size-btn" onclick="window.selectSize(this, '6XL')">6XL</button>
        </div>
        <button onclick="window.addToCart()" style="width:90%; margin:0 5%; padding:15px; background:var(--bio-high); border:none; font-weight:bold; color:#000;">UPLOAD TO MANIFEST</button>
    </div>
</div>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    window.allProducts = []; 
    window.cart = []; 
    window.itemsPerPage = 24; 
    window.isInteractive = false;

    // --- COSMOS ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // Orbit Controls
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false; // Disabled by default
    controls.enableDamping = true;
    controls.autoRotate = false;

    const textureLoader = new THREE.TextureLoader();
    scene.background = textureLoader.load('8k_stars_milky_way.jpg');

    const systemGroup = new THREE.Group();
    scene.add(systemGroup);

    const planets = [];

    function createPlanet(name, size, textureFile, distance, orbitSpeed, hasRings = false) {
        const geometry = new THREE.SphereGeometry(size, 64, 64);
        const material = new THREE.MeshStandardMaterial({ map: textureLoader.load(textureFile), metalness: 0.4, roughness: 0.7 });
        const planet = new THREE.Mesh(geometry, material);
        const orbitData = { mesh: planet, distance: distance, speed: orbitSpeed, angle: Math.random() * Math.PI * 2 };
        if (hasRings) {
            const ringGeo = new THREE.RingGeometry(size * 1.4, size * 2.2, 64);
            const ringMat = new THREE.MeshBasicMaterial({ map: textureLoader.load('8k_saturn_ring_alpha.png'), side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
            const rings = new THREE.Mesh(ringGeo, ringMat);
            rings.rotation.x = Math.PI / 2; planet.add(rings);
        }
        systemGroup.add(planet);
        planets.push(orbitData);
        return planet;
    }

    const sun = createPlanet("Sun", 60, '1000000142.jpg', 0, 0);
    sun.material.emissive = new THREE.Color(0xff4500);
    sun.material.emissiveIntensity = 1.5;

    createPlanet("Mercury", 5, '1000000128.jpg', 140, 0.012);
    createPlanet("Venus", 10, '1000000129.jpg', 220, 0.009);
    createPlanet("Earth", 11, '8k_earth_daymap.jpg', 320, 0.007);
    createPlanet("Mars", 8, '1000000131.jpg', 420, 0.005);
    createPlanet("Jupiter", 35, '1000000132.jpg', 600, 0.003);
    createPlanet("Saturn", 30, '1000000133.jpg', 850, 0.002, true);
    createPlanet("Uranus", 20, '2k_uranus.jpg', 1100, 0.001);
    createPlanet("Neptune", 20, '2k_neptune.jpg', 1300, 0.0008);

    const pointLight = new THREE.PointLight(0xffffff, 8, 3000);
    scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0x404040, 1.0));

    camera.position.set(0, 800, 2000);
    camera.lookAt(0,0,0);

    const clock = new THREE.Clock();

    function animate() {
        requestAnimationFrame(animate);
        const t = clock.getElapsedTime();
        planets.forEach(p => {
            if(p.distance > 0) {
                p.angle += p.speed;
                p.mesh.position.x = Math.cos(p.angle) * p.distance;
                p.mesh.position.z = Math.sin(p.angle) * p.distance;
            }
            p.mesh.rotation.y += 0.005;
        });
        sun.material.emissiveIntensity = 1.2 + Math.sin(t * 1.5) * 0.5;
        if (controls.enabled) controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- INTERACTIVE UI LOGIC ---
    window.toggleInteractive = function() {
        window.isInteractive = !window.isInteractive;
        const btn = document.getElementById('interactive-toggle');
        const header = document.getElementById('ui-header');
        const grid = document.getElementById('store-grid');
        const footer = document.getElementById('ui-footer');
        const sliderBox = document.getElementById('footer-slider-box');
        const designBtn = document.getElementById('design-toggle');

        if (window.isInteractive) {
            btn.classList.add('active');
            header.classList.add('ui-hidden');
            grid.classList.add('ui-hidden');
            footer.style.border = 'none';
            footer.style.background = 'transparent';
            sliderBox.classList.add('ui-hidden');
            designBtn.classList.add('ui-hidden');
            controls.enabled = true;
        } else {
            btn.classList.remove('active');
            header.classList.remove('ui-hidden');
            grid.classList.remove('ui-hidden');
            footer.style.borderTop = '1px solid var(--bio-high)';
            footer.style.background = '#000';
            sliderBox.classList.remove('ui-hidden');
            designBtn.classList.remove('ui-hidden');
            controls.enabled = false;
        }
    };

    window.enterSystem = function() {
        document.getElementById('landing-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('landing-overlay').style.display = 'none';
            ['ui-header', 'store-grid', 'ui-footer'].forEach(id => {
                const el = document.getElementById(id);
                el.style.display = (id === 'store-grid') ? 'grid' : 'flex';
                setTimeout(() => el.style.opacity = '1', 50);
            });
            fetchStore();
        }, 1000);
    };

    async function fetchStore() {
        try {
            const res = await fetch('/api/artemis-2.js');
            const data = await res.json();
            if (data.products) { 
                window.allProducts = data.products; 
                setupNavigation();
                renderGrid(1); 
            }
        } catch (e) {}
    }

    function setupNavigation() {
        const slider = document.getElementById('sector-slider');
        const totalPages = Math.ceil(window.allProducts.length / window.itemsPerPage);
        slider.max = totalPages;
        slider.oninput = (e) => {
            document.getElementById('sector-display').innerText = `SECTOR ${e.target.value.padStart(2, '0')} / ${totalPages.toString().padStart(2, '0')}`;
            renderGrid(parseInt(e.target.value));
        };
    }

    function renderGrid(page) {
        const grid = document.getElementById('store-grid');
        const items = window.allProducts.slice((page - 1) * window.itemsPerPage, page * window.itemsPerPage);
        grid.innerHTML = items.map(p => `
            <div class="card" onclick="window.openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
                <div class="grid-label">${p.name.split('Prompt:')[1] || 'OLYMPIAN'}</div>
            </div>`).join('');
    }

    window.openModal = function(name, img) {
        window.activeProduct = { name, img }; window.selectedSize = null;
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; mix-blend-mode:screen;">`;
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.selectSize = function(btn, size) { 
        window.selectedSize = size; 
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected')); 
        btn.classList.add('selected'); 
    };

    window.closeModal = function() { document.getElementById('modal-overlay').style.display = 'none'; };
    window.toggleCart = function(show) { document.getElementById('side-cart').classList.toggle('open', show); };

    window.addToCart = function() {
        if(!window.selectedSize) return alert("SELECT SIZE");
        window.cart.push({...window.activeProduct, size: window.selectedSize});
        document.getElementById('cart-trigger').innerText = `MANIFEST (${window.cart.length})`;
        window.closeModal(); window.toggleCart(true);
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
