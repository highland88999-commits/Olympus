<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // SOLAR CORE</title>
    <style>
        :root { 
            --neon-cyan: #00f2ff;
            --neon-orange: #ff4500;
            --ui-bg: rgba(0, 0, 0, 0.85);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', monospace; 
            color: var(--neon-cyan); overflow: hidden; 
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .ui-hidden { opacity: 0 !important; pointer-events: none !important; }

        /* --- LANDING OVERLAY --- */
        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5000; background: rgba(0,0,0,0.7);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.8s cubic-bezier(0.85, 0, 0.15, 1);
            backdrop-filter: blur(10px);
        }

        .kraken-container { width: 90%; max-width: 400px; text-align: center; }

        .btn-main {
            display: block; background: var(--neon-cyan); color: #000;
            padding: 20px; font-weight: bold; text-decoration: none;
            letter-spacing: 2px; border: none; box-shadow: 0 0 20px rgba(0,242,255,0.5);
            margin-bottom: 15px; cursor: pointer; text-transform: uppercase;
        }

        #enter-core {
            background: transparent; border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); width: 100%; padding: 12px; cursor: pointer;
            font-size: 0.7rem; letter-spacing: 3px;
        }

        /* --- NAVIGATION --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 100; height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; box-sizing: border-box;
            background: var(--ui-bg); border-bottom: 1px solid var(--neon-cyan); 
            transition: 0.5s ease; 
        }

        #store-grid { 
            position: relative; z-index: 5; display: grid;
            grid-template-columns: repeat(2, 1fr); gap: 20px; 
            width: 90%; margin: 90px auto 100px auto; 
            height: calc(100vh - 190px); overflow-y: auto;
            scrollbar-width: none; transition: 0.5s ease;
        }

        .card { 
            background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 1/1; position: relative; display: flex; align-items: center; justify-content: center;
        }
        
        .card::after {
            content: "SECURED ASSET"; position: absolute; bottom: 10px; font-size: 0.5rem; letter-spacing: 1px;
        }

        .footer {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: var(--ui-bg); z-index: 100; 
            display: flex; align-items: center; justify-content: space-between;
            border-top: 1px solid var(--neon-cyan); padding: 0 30px; box-sizing: border-box;
            transition: 0.5s ease;
        }

        .btn-footer {
            border: 1px solid var(--neon-cyan); background: transparent; 
            color: var(--neon-cyan); padding: 10px 20px; cursor: pointer;
            text-decoration: none; font-size: 0.7rem; letter-spacing: 1px;
        }
        
        .btn-footer:hover { background: var(--neon-cyan); color: #000; }
    </style>
</head>
<body>

<div id="landing-overlay">
    <div class="kraken-container">
        <a href="https://invite.kraken.com/JDNW/2yyr243k" target="_blank" class="btn-main">CLAIM 200 CAD BTC</a>
        <button id="enter-core" onclick="dismissLanding()">ENTER SOLAR CORE</button>
    </div>
</div>

<header id="ui-header" class="ui-hidden">
    <div style="letter-spacing: 5px;">OLYMPIAN // V1</div>
    <div style="font-size: 0.7rem;">MANIFEST (0)</div>
</header>

<div id="store-grid" class="ui-hidden">
    <div class="card"></div><div class="card"></div>
    <div class="card"></div><div class="card"></div>
    <div class="card"></div><div class="card"></div>
</div>

<footer class="footer ui-hidden" id="ui-footer">
    <a href="mailto:stakeme10000@gmail.com?subject=Custom Design Inquiry" class="btn-footer">CUSTOM DESIGN</a>
    <div style="font-size: 0.7rem; letter-spacing: 2px;">SECTOR 01 / 15</div>
    <button class="btn-footer" id="toggle-sim" onclick="toggleSim()">INTERACTIVE 🪐</button>
</footer>

<script type="importmap">
    { "imports": { 
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- ENGINE SETUP ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 20000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    camera.position.set(0, 1500, 3000);

    const textureLoader = new THREE.TextureLoader();
    const assetsPath = './assets/';

    // --- STARFIELD (1000000141.jpg) ---
    const starGeo = new THREE.SphereGeometry(10000, 64, 64);
    const starMat = new THREE.MeshBasicMaterial({ 
        map: textureLoader.load(assetsPath + '1000000141.jpg'), 
        side: THREE.BackSide 
    });
    scene.add(new THREE.Mesh(starGeo, starMat));

    // --- SOLAR SYSTEM LOGIC ---
    const celestialBodies = [];

    function createBody(name, radius, texture, distance, speed, parent = scene, extraLayer = null) {
        const pivot = new THREE.Group();
        parent.add(pivot);

        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(radius, 64, 64),
            new THREE.MeshStandardMaterial({ map: textureLoader.load(assetsPath + texture) })
        );
        mesh.position.x = distance;
        pivot.add(mesh);

        // Add Atmospheric/Cloud layers (Earth/Venus)
        if(extraLayer) {
            const layerMesh = new THREE.Mesh(
                new THREE.SphereGeometry(radius + 2, 64, 64),
                new THREE.MeshStandardMaterial({ 
                    map: textureLoader.load(assetsPath + extraLayer), 
                    transparent: true, 
                    opacity: 0.4 
                })
            );
            mesh.add(layerMesh);
        }

        const data = { pivot, mesh, speed };
        celestialBodies.push(data);
        return data;
    }

    // Sun (1000000142.jpg)
    const sun = new THREE.Mesh(
        new THREE.SphereGeometry(250, 64, 64),
        new THREE.MeshBasicMaterial({ map: textureLoader.load(assetsPath + '1000000142.jpg') })
    );
    scene.add(sun);

    // Planets
    createBody("Mercury", 15, '1000000128.jpg', 500, 0.01);
    createBody("Venus", 35, '1000000129.jpg', 750, 0.007, scene, '1000000130.jpg');
    
    // Earth Complex (Night: 1000000138, Atmosphere: 1000000135, Moon: 1000000143)
    const earth = createBody("Earth", 38, '1000000138.jpg', 1100, 0.005, scene, '1000000135.jpg');
    const moon = new THREE.Mesh(
        new THREE.SphereGeometry(8, 32, 32),
        new THREE.MeshStandardMaterial({ map: textureLoader.load(assetsPath + '1000000143.jpg') })
    );
    moon.position.x = 80;
    earth.mesh.add(moon); // Moon child of Earth mesh

    createBody("Mars", 22, '1000000131.jpg', 1450, 0.004);
    createBody("Jupiter", 110, '1000000132.jpg', 1900, 0.002);
    
    // Saturn Complex (Planet: 1000000133, Rings: 1000000134)
    const saturn = createBody("Saturn", 90, '1000000133.jpg', 2500, 0.0015);
    const ringGeo = new THREE.RingGeometry(120, 220, 64);
    const ringMat = new THREE.MeshBasicMaterial({ 
        map: textureLoader.load(assetsPath + '1000000134.png'), 
        side: THREE.DoubleSide, 
        transparent: true 
    });
    const rings = new THREE.Mesh(ringGeo, ringMat);
    rings.rotation.x = Math.PI / 2;
    saturn.mesh.add(rings);

    createBody("Neptune", 75, '1000000136.jpg', 3100, 0.001);

    // Lighting
    const pointLight = new THREE.PointLight(0xffffff, 2.5, 10000);
    scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.2));

    // --- ANIMATION ---
    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.002;
        celestialBodies.forEach(b => {
            b.pivot.rotation.y += b.speed;
            b.mesh.rotation.y += 0.005;
        });
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // --- INTERFACE ---
    window.dismissLanding = function() {
        document.getElementById('landing-overlay').style.transform = "translateY(-100%)";
        setTimeout(() => {
            ['ui-header', 'store-grid', 'ui-footer'].forEach(id => {
                document.getElementById(id).classList.remove('ui-hidden');
            });
        }, 600);
    };

    window.toggleSim = function() {
        const isInteractive = !controls.enabled;
        controls.enabled = isInteractive;
        document.getElementById('toggle-sim').innerText = isInteractive ? "EXIT VIEWPORT" : "INTERACTIVE 🪐";
        document.getElementById('store-grid').classList.toggle('ui-hidden', isInteractive);
        document.getElementById('ui-header').classList.toggle('ui-hidden', isInteractive);
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
