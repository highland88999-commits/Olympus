<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OLYMPIAN // SOLAR CORE</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --dark-bg: #000a0a;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--dark-bg);
            font-family: 'Courier New', Courier, monospace;
            color: var(--neon-cyan);
            text-transform: uppercase;
        }

        /* UI Overlays */
        #ui-header {
            position: absolute;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            box-sizing: border-box;
            border-bottom: 1px solid var(--neon-cyan);
            background: rgba(0, 10, 10, 0.8);
            z-index: 10;
        }

        .header-title {
            letter-spacing: 5px;
            font-weight: bold;
        }

        .manifest-btn {
            border: 1px solid var(--neon-cyan);
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }

        .manifest-btn:hover {
            background: var(--neon-cyan);
            color: black;
        }

        #ui-footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 30px 40px;
            box-sizing: border-box;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .custom-btn {
            border: 2px solid var(--neon-cyan);
            background: transparent;
            color: var(--neon-cyan);
            padding: 15px 30px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .custom-btn:hover {
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .interactive-toggle {
            display: flex;
            align-items: center;
            border: 1px solid var(--neon-cyan);
            padding: 10px 20px;
            background: rgba(0, 242, 255, 0.1);
            cursor: pointer;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <header id="ui-header">
        <div class="header-title">OLYMPIAN // SOLAR CORE</div>
        <div class="manifest-btn">MANIFEST (0)</div>
    </header>

    <div id="canvas-container"></div>

    <footer id="ui-footer">
        <a href="mailto:stakeme10000@gmail.com?subject=Custom Design Inquiry" class="custom-btn">CUSTOM DESIGN</a>
        <div class="sector-info">SECTOR 01 / 15</div>
        <div class="interactive-toggle" id="toggle-interaction">
            INTERACTIVE 🪐
        </div>
    </footer>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // Scene Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        camera.position.set(0, 50, 150);
        controls.update();

        const textureLoader = new THREE.TextureLoader();

        // Background Starfield
        const starGeo = new THREE.SphereGeometry(1000, 64, 64);
        const starMat = new THREE.MeshBasicMaterial({
            map: textureLoader.load('./assets/1000000141.jpg'),
            side: THREE.BackSide
        });
        scene.add(new THREE.Mesh(starGeo, starMat));

        // Light Sources
        const sunLight = new THREE.PointLight(0xffffff, 2, 2000);
        scene.add(sunLight);
        scene.add(new THREE.AmbientLight(0x222222));

        // Asset Directory Mapping
        const path = './assets/';

        // --- Celestial Bodies ---

        // 1. Sun
        const sunGeo = new THREE.SphereGeometry(20, 64, 64);
        const sunMat = new THREE.MeshBasicMaterial({ map: textureLoader.load(path + '1000000142.jpg') });
        const sun = new THREE.Mesh(sunGeo, sunMat);
        scene.add(sun);

        // Function to create planets
        function createPlanet(size, texture, distance, orbitSpeed, cloudTexture = null) {
            const planetGroup = new THREE.Group();
            scene.add(planetGroup);

            const mesh = new THREE.Mesh(
                new THREE.SphereGeometry(size, 32, 32),
                new THREE.MeshStandardMaterial({ map: textureLoader.load(path + texture) })
            );
            mesh.position.x = distance;
            planetGroup.add(mesh);

            // Atmosphere/Clouds Layer
            if (cloudTexture) {
                const cloudMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(size + 0.1, 32, 32),
                    new THREE.MeshStandardMaterial({ 
                        map: textureLoader.load(path + cloudTexture), 
                        transparent: true, 
                        opacity: 0.4 
                    })
                );
                cloudMesh.position.x = distance;
                planetGroup.add(cloudMesh);
            }

            return { group: planetGroup, mesh: mesh, speed: orbitSpeed };
        }

        // Initialize Planets
        const planets = [
            createPlanet(1.2, '1000000128.jpg', 30, 0.02), // Mercury
            createPlanet(2.5, '1000000129.jpg', 50, 0.015, '1000000130.jpg'), // Venus
            createPlanet(2.6, '1000000138.jpg', 75, 0.01, '1000000135.jpg'), // Earth
            createPlanet(1.8, '1000000131.jpg', 95, 0.008), // Mars
            createPlanet(7, '1000000132.jpg', 130, 0.005), // Jupiter
            createPlanet(6, '1000000133.jpg', 180, 0.003), // Saturn
            createPlanet(4, '1000000136.jpg', 220, 0.002)  // Neptune
        ];

        // Earth's Moon
        const moon = new THREE.Mesh(
            new THREE.SphereGeometry(0.5, 32, 32),
            new THREE.MeshStandardMaterial({ map: textureLoader.load(path + '1000000143.jpg') })
        );
        moon.position.x = 8; 
        planets[2].mesh.add(moon); // Attached to Earth

        // Saturn's Rings
        const ringGeo = new THREE.RingGeometry(8, 14, 64);
        const ringTex = textureLoader.load(path + '1000000134.png');
        const ringMat = new THREE.MeshBasicMaterial({ map: ringTex, side: THREE.DoubleSide, transparent: true });
        const rings = new THREE.Mesh(ringGeo, ringMat);
        rings.rotation.x = Math.PI / 2;
        planets[5].mesh.add(rings); // Attached to Saturn

        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);

            sun.rotation.y += 0.004;

            planets.forEach(p => {
                p.group.rotation.y += p.speed;
                p.mesh.rotation.y += 0.01;
            });

            controls.update();
            renderer.render(scene, camera);
        }

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // UI Logic
        document.getElementById('toggle-interaction').addEventListener('click', () => {
            controls.autoRotate = !controls.autoRotate;
            alert("Auto-Orbit Toggled.");
        });

    </script>
</body>
</html>
