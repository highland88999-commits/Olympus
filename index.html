<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // MAIN</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; overflow: hidden; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* LAYER 1: LANDING */
        #landing { position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.9); display: flex; align-items: center; justify-content: center; backdrop-filter: blur(20px); transition: 0.8s ease; }
        .k-box { width: 300px; text-align: center; }
        .k-btn { display: block; background: var(--neon); color: #000; padding: 15px; font-weight: bold; text-decoration: none; margin-bottom: 10px; box-shadow: 0 0 15px var(--neon); }
        .enter { background: transparent; border: 1px solid var(--neon); color: var(--neon); width: 100%; padding: 10px; cursor: pointer; font-size: 0.7rem; }

        /* LAYER 2: STORE */
        header { position: fixed; top: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; padding: 20px 30px; box-sizing: border-box; background: linear-gradient(to bottom, black, transparent); border-bottom: 1px solid rgba(0,242,255,0.2); }
        #store { position: relative; z-index: 10; margin-top: 80px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; height: calc(100vh - 180px); overflow-y: auto; scrollbar-width: none; }
        .card { border: 1px solid rgba(0,242,255,0.3); background: rgba(0,242,255,0.05); padding: 10px; text-align: center; cursor: pointer; }
        .card img { width: 100%; mix-blend-mode: screen; }

        footer { position: fixed; bottom: 0; width: 100%; z-index: 100; display: flex; justify-content: space-between; padding: 20px 30px; box-sizing: border-box; background: linear-gradient(to top, black, transparent); border-top: 1px solid rgba(0,242,255,0.2); }
        .btn-ui { border: 1px solid var(--neon); background: transparent; color: var(--neon); padding: 8px 15px; cursor: pointer; font-size: 0.7rem; }

        .hidden { display: none !important; }
        
        /* MODAL */
        #modal { position: fixed; inset: 0; z-index: 6000; background: rgba(0,0,0,0.95); display: none; align-items: center; justify-content: center; }
        .m-box { border: 1px solid var(--neon); padding: 30px; background: #000; text-align: center; width: 280px; }
        .sizes { display: flex; gap: 10px; justify-content: center; margin: 20px 0; }
        .s-btn { border: 1px solid var(--neon); color: var(--neon); background: none; padding: 8px; cursor: pointer; min-width: 40px; }
        .s-btn.active { background: var(--neon); color: #000; }
    </style>
</head>
<body>

<div id="landing">
    <div class="k-box">
        <a href="https://invite.kraken.com/JDNW/2yyr243k" target="_blank" class="k-btn">CLAIM 200 CAD BTC</a>
        <button class="enter" onclick="unlock()">ENTER SOLAR CORE</button>
    </div>
</div>

<header class="ui hidden">
    <div>OLYMPIAN // HUB</div>
    <div>MANIFEST (<span id="count">0</span>)</div>
</header>

<div id="store" class="ui hidden">
    <div class="card" onclick="openM('ASSET_145')"><img src="./assets/1000000145.jpg"><div>V1 CORE</div></div>
    <div class="card" onclick="openM('ASSET_147')"><img src="./assets/1000000147.jpg"><div>V2 PULSE</div></div>
</div>

<footer class="ui hidden">
    <a href="mailto:stakeme10000@gmail.com" class="btn-ui" style="text-decoration:none">CUSTOM</a>
    <button class="btn-ui" onclick="view()">VIEWPORT 🪐</button>
</footer>

<div id="modal" onclick="closeM()">
    <div class="m-box" onclick="event.stopPropagation()">
        <div id="m-title">SIZE SELECT</div>
        <div class="sizes">
            <button class="s-btn" onclick="setS(this)">S</button>
            <button class="s-btn" onclick="setS(this)">M</button>
            <button class="s-btn" onclick="setS(this)">L</button>
        </div>
        <button class="k-btn" style="width:100%" onclick="add()">UPLOAD</button>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- LAYER 3: CORE SIMULATION ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 10000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    camera.position.set(0, 800, 1800);

    const loader = new THREE.TextureLoader();
    const path = './assets/';

    // Starfield wrapping
    const starfield = new THREE.Mesh(
        new THREE.SphereGeometry(5000, 64, 64),
        new THREE.MeshBasicMaterial({ map: loader.load(path + '1000000141.jpg'), side: THREE.BackSide })
    );
    scene.add(starfield);

    const sun = new THREE.Mesh(
        new THREE.SphereGeometry(180, 64, 64),
        new THREE.MeshBasicMaterial({ map: loader.load(path + '1000000142.jpg') })
    );
    scene.add(sun);

    const planets = [];
    function addP(rad, tex, dist, speed, ring = null) {
        const pivot = new THREE.Group();
        scene.add(pivot);
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(rad, 64, 64), new THREE.MeshStandardMaterial({ map: loader.load(path + tex) }));
        mesh.position.x = dist;
        pivot.add(mesh);
        
        if(ring) {
            const r = new THREE.Mesh(new THREE.RingGeometry(rad*1.5, rad*2.5, 64), new THREE.MeshBasicMaterial({ map: loader.load(path + ring), side: THREE.DoubleSide, transparent: true }));
            r.rotation.x = Math.PI/2;
            mesh.add(r);
        }
        planets.push({ pivot, mesh, speed });
        return mesh;
    }

    addP(15, '1000000128.jpg', 350, 0.01); // Mercury
    const earth = addP(30, '1000000138.jpg', 600, 0.007); // Earth
    const moon = new THREE.Mesh(new THREE.SphereGeometry(8, 32, 32), new THREE.MeshStandardMaterial({ map: loader.load(path + '1000000143.jpg') }));
    moon.position.x = 60;
    earth.add(moon);

    addP(60, '1000000133.jpg', 1200, 0.002, '1000000134.png'); // Saturn

    const light = new THREE.PointLight(0xffffff, 2, 8000);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));

    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.001;
        planets.forEach(p => { p.pivot.rotation.y += p.speed; p.mesh.rotation.y += 0.005; });
        if(controls.enabled) controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.unlock = () => {
        document.getElementById('landing').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('landing').classList.add('hidden');
            document.querySelectorAll('.ui').forEach(el => el.classList.remove('hidden'));
        }, 800);
    };

    window.view = () => {
        const isV = !controls.enabled;
        controls.enabled = isV;
        document.querySelectorAll('.ui').forEach(el => el.classList.toggle('hidden', isV));
    };
</script>

<script>
    let c = 0;
    window.openM = (t) => { document.getElementById('modal').style.display = 'flex'; };
    window.closeM = () => { document.getElementById('modal').style.display = 'none'; };
    window.setS = (b) => { document.querySelectorAll('.s-btn').forEach(btn => btn.classList.remove('active')); b.classList.add('active'); };
    window.add = () => { c++; document.getElementById('count').innerText = c; closeM(); };
</script>
</body>
</html>
