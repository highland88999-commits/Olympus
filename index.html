<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // SOLAR CORE</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; color: var(--neon); font-family: 'Courier New', monospace; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* OVERLAYS */
        #gateway { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease; }
        .ui-header { position: fixed; top: 0; width: 100%; z-index: 100; padding: 30px; display: flex; justify-content: space-between; background: linear-gradient(to bottom, black, transparent); letter-spacing: 5px; font-weight: bold; }
        .k-btn { background: var(--neon); color: #000; padding: 15px 35px; text-decoration: none; font-weight: bold; box-shadow: 0 0 20px var(--neon); letter-spacing: 3px; cursor: pointer; border: none; }
        .hidden { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>

<div id="gateway">
    <div style="text-align:center;">
        <button class="k-btn" onclick="ignite()">IGNITE SOLAR CORE</button>
        <p style="font-size: 0.6rem; margin-top: 20px; opacity: 0.5;">ASSETS: 8K_RESOURCES_CONNECTED</p>
    </div>
</div>

<div class="ui-header">
    <div>OLYMPIAN // V1</div>
    <div id="coords">ORBITAL SYNC: ACTIVE</div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- REPO-DRIVEN ASSET MAP ---
    const ASSETS = {
        stars: '8k_stars_milky_way.jpg',
        sun: '8k_sun.jpg',
        earth: '8k_earth_nightmap.jpg',
        moon: '8k_moon.jpg',
        saturn: '8k_saturn.jpg',
        rings: '8k_saturn_ring_alpha.png',
        neptune: '2k_neptune.jpg',
        jupiter: '8k_jupiter.jpg',
        mars: '8k_mars.jpg',
        venus: '8k_venus_surface.jpg',
        mercury: '8k_mercury.jpg'
    };

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 30000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 1500, 4000);

    const loader = new THREE.TextureLoader();
    const path = './assets/';

    // 1. STARFIELD WRAP
    const starGeo = new THREE.SphereGeometry(15000, 64, 64);
    const starMat = new THREE.MeshBasicMaterial({ map: loader.load(path + ASSETS.stars), side: THREE.BackSide });
    scene.add(new THREE.Mesh(starGeo, starMat));

    // 2. THE SUN
    const sun = new THREE.Mesh(new THREE.SphereGeometry(400, 64, 64), new THREE.MeshBasicMaterial({ map: loader.load(path + ASSETS.sun) }));
    scene.add(sun);

    // 3. PLANETARY FACTORY
    const bodies = [];
    function createPlanet(rad, tex, dist, speed, ringTex = null) {
        const pivot = new THREE.Group();
        scene.add(pivot);
        const mesh = new THREE.Mesh(new THREE.SphereGeometry(rad, 64, 64), new THREE.MeshStandardMaterial({ map: loader.load(path + tex) }));
        mesh.position.x = dist;
        pivot.add(mesh);
        
        if(ringTex) {
            const rings = new THREE.Mesh(new THREE.RingGeometry(rad*1.6, rad*3, 64), new THREE.MeshBasicMaterial({ map: loader.load(path + ringTex), side: THREE.DoubleSide, transparent: true }));
            rings.rotation.x = Math.PI/2;
            mesh.add(rings);
        }
        bodies.push({ pivot, mesh, speed });
        return mesh;
    }

    // Alignment based on your Repo Content
    createPlanet(20, ASSETS.mercury, 600, 0.015);
    createPlanet(45, ASSETS.venus, 900, 0.01);
    const earth = createPlanet(50, ASSETS.earth, 1300, 0.007);
    createPlanet(30, ASSETS.mars, 1700, 0.005);
    createPlanet(150, ASSETS.jupiter, 2500, 0.002);
    createPlanet(120, ASSETS.saturn, 3500, 0.001, ASSETS.rings);
    createPlanet(90, ASSETS.neptune, 4500, 0.0008);

    // Moon Orbit (Parented to Earth)
    const moon = new THREE.Mesh(new THREE.SphereGeometry(12, 32, 32), new THREE.MeshStandardMaterial({ map: loader.load(path + ASSETS.moon) }));
    moon.position.x = 100;
    earth.add(moon);

    // Lighting
    const pointLight = new THREE.PointLight(0xffffff, 5, 20000);
    scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.15));

    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.001;
        bodies.forEach(b => {
            b.pivot.rotation.y += b.speed;
            b.mesh.rotation.y += 0.005;
        });
        controls.update();
        renderer.render(scene, camera);
    }
    animate();

    window.ignite = () => {
        document.getElementById('gateway').classList.add('hidden');
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
