<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>OLYMPUS x MAPS | ORBITAL EVENTS</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">

    <style>
        :root { 
            --fire: #ff4500; --blood: #ff0033;
            --bio-low: #001a33; --bio-high: #00f2ff; 
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; background: #000; 
            font-family: 'Courier New', monospace; color: white; overflow: hidden; text-transform: uppercase;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: auto; outline: none; }
        
        /* --- KRAKEN LANDING --- */
        #kraken-lander {
            position: fixed; inset: 0; background: #000; z-index: 5000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1); pointer-events: auto;
        }
        .lander-card {
            width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--bio-high);
            padding: 40px; background: rgba(0, 26, 51, 0.6); box-shadow: 0 0 30px var(--bio-low);
        }
        .kraken-btn {
            display: block; background: var(--bio-high); color: #000; padding: 18px;
            text-decoration: none; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; box-shadow: 0 0 20px var(--bio-high); transition: 0.3s;
        }
        .btn-core {
            background: rgba(0,0,0,0.5); border: 1px solid var(--bio-high); color: var(--bio-high);
            padding: 12px 24px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px;
            backdrop-filter: blur(5px); transition: 0.3s; outline: none; text-align: center;
        }
        .btn-core:hover { background: var(--bio-high); color: #000; box-shadow: 0 0 15px var(--bio-high); }

        /* --- UI LAYER --- */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; box-sizing: border-box; opacity: 0; transition: opacity 1s; }
        header, footer { display: flex; justify-content: space-between; pointer-events: auto; align-items: center; }
        h1 { letter-spacing: 5px; color: var(--bio-high); text-shadow: 0 0 15px var(--bio-high); font-size: 1rem; margin: 0; }

        /* STORE GRID */
        #store-grid { 
            position: relative; z-index: 5; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 100%; max-width: 1000px; margin: 20px auto 0 auto; 
            height: calc(100vh - 200px); overflow-y: auto; scrollbar-width: none; pointer-events: auto;
            transition: opacity 0.5s ease; display: none; opacity: 0;
        }
        .card { 
            position: relative; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.8 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px var(--bio-low); transition: 0.3s; backdrop-filter: blur(5px);
        }
        .card:hover { border-color: var(--bio-high); box-shadow: 0 0 20px var(--bio-high); }
        .card img { width: 85%; height: 85%; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 8px var(--bio-high)); }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,26,51,0.9); font-size: 0.55rem; text-align: center; padding: 6px 0; color: var(--bio-high); border-top: 1px solid var(--bio-high); }

        /* CART & HUD */
        #cart-trigger { display: flex; align-items: center; gap: 10px; color: var(--bio-high); border: 1px solid var(--bio-high); padding: 8px 15px; font-size: 0.7rem; cursor: pointer; background: rgba(0, 242, 255, 0.05); }
        .cart-icon-wrapper { position: relative; width: 20px; height: 20px; display: flex; align-items: flex-end; justify-content: center; font-size: 1rem; }
        #visual-stack { display: flex; flex-direction: column-reverse; gap: 2px; width: 100%; position: absolute; bottom: 0; }
        .hoodie-fold { width: 100%; height: 4px; background: var(--bio-high); box-shadow: 0 0 5px var(--bio-high); }

        #hud-center { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 90%; max-width: 400px; }
        .alert-box { border: 1px solid var(--bio-high); background: rgba(0, 242, 255, 0.1); color: var(--bio-high); padding: 15px 10px; font-weight: bold; letter-spacing: 3px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); opacity: 0; transition: opacity 0.5s ease; margin-bottom: 15px; text-shadow: 0 0 10px; font-size: 0.8rem; }
        .alert-box.active { opacity: 1; animation: pulse 1s infinite; }
        .alert-box.blood { border-color: var(--blood); color: var(--blood); background: rgba(255, 0, 51, 0.1); box-shadow: 0 0 20px rgba(255, 0, 51, 0.4); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- SIDE CART MANIFEST --- */
        #side-cart { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #000; border-left: 1px solid var(--bio-high); z-index: 7000; transition: 0.4s; pointer-events: auto; }
        #side-cart.open { right: 0; }
        .pay-link { display: block; width: 90%; margin: 10px auto; padding: 15px 0; text-align: center; font-size: 0.8rem; text-decoration: none; font-weight: bold; letter-spacing: 2px; }

        /* --- ITEM MODAL --- */
        #modal-overlay { position: fixed; inset: 0; z-index: 6000; display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); align-items: center; justify-content: center; pointer-events: auto; }
        .modal-content { width: 90%; max-width: 420px; background: #000; border: 2px solid var(--bio-high); position: relative; padding-bottom: 20px; }
        .close-modal { position: absolute; top: 5px; right: 15px; font-size: 2rem; color: var(--bio-high); cursor: pointer; z-index: 100; }
        .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 20px; }
        .size-btn { border: 1px solid var(--bio-high); background: #000; color: #fff; padding: 12px 0; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .size-btn.selected { background: var(--bio-high); color: #000; font-weight: bold; }

        /* --- MAP HOLOFRAME --- */
        #map-holoframe { position: fixed; inset: 0; z-index: 6000; display: none; opacity: 0; background: rgba(0, 26, 51, 0.4); backdrop-filter: blur(8px); align-items: center; justify-content: center; transition: opacity 0.4s ease; pointer-events: auto; }
        .map-glass-container { width: 90%; height: 80%; max-width: 1000px; position: relative; border: 2px solid var(--bio-high); border-radius: 5px; background: rgba(0,0,0,0.5); overflow: hidden; transform: scale(0.95); transition: transform 0.4s ease; }
        .close-map { position: absolute; top: 10px; right: 20px; color: var(--bio-high); font-size: 2.5rem; cursor: pointer; z-index: 6001; font-weight: bold; text-shadow: 0 0 10px #000; }
        #map-iframe { width: 100%; height: 100%; border: none; filter: contrast(1.2) hue-rotate(180deg) invert(1); }
    </style>
</head>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 60000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enabled = false;

    // Fix: Set Initial Camera Target and Position explicitly
    camera.position.set(900, 2500, 6500);
    controls.target.set(900, 0, 0);
    controls.update();

    const loader = new THREE.TextureLoader();
    const assetPath = './assets/';

    // --- ADAPTIVE POSITIONING ---
    let camBasePos = new THREE.Vector3(900, 2500, 6000);
    let camTarget = new THREE.Vector3(900, 0, 0);

    function updateCamera() {
        const aspect = window.innerWidth / window.innerHeight;
        camBasePos.z = aspect < 1 ? 10000 : 6500;
        if (!window.eventActive) {
            camera.position.lerp(camBasePos, 0.1);
            controls.target.lerp(camTarget, 0.1);
        }
    }

    // --- BLOOM ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.4, 0.85);
    composer.addPass(bloomPass);

    // --- STARS ---
    const starGeo = new THREE.BufferGeometry();
    const posArray = new Float32Array(20000 * 3);
    for(let i=0; i<20000*3; i++) posArray[i] = (Math.random()-0.5)*45000;
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.5})));

    // --- BODIES ---
    const sunTex = loader.load(assetPath + '8k_sun.jpg');
    sunTex.colorSpace = THREE.SRGBColorSpace;
    const sun = new THREE.Mesh(new THREE.SphereGeometry(450, 64, 64), new THREE.MeshBasicMaterial({ map: sunTex, transparent: true, opacity: 1 }));
    scene.add(sun);

    const sunLight = new THREE.PointLight(0xffffff, 8, 30000);
    sunLight.castShadow = true;
    sunLight.shadow.mapSize.set(2048, 2048);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.05));

    const earthOrbit = new THREE.Group();
    scene.add(earthOrbit);

    const earthTex = loader.load(assetPath + '8k_earth_nightmap.jpg');
    earthTex.colorSpace = THREE.SRGBColorSpace;
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(150, 64, 64),
        new THREE.MeshStandardMaterial({ map: earthTex, emissive: 0xffffff, emissiveMap: earthTex, emissiveIntensity: 0.6 })
    );
    earth.position.x = 2200;
    earth.castShadow = true; earth.receiveShadow = true;
    earthOrbit.add(earth);

    const atmos = new THREE.Mesh(
        new THREE.SphereGeometry(155, 64, 64),
        new THREE.MeshStandardMaterial({ color: 0x00f2ff, transparent: true, opacity: 0.1, blending: THREE.AdditiveBlending, side: THREE.FrontSide, depthWrite: false })
    );
    earth.add(atmos);

    const moonOrbit = new THREE.Group();
    earth.add(moonOrbit);

    const moonTex = loader.load(assetPath + '8k_moon.jpg');
    moonTex.colorSpace = THREE.SRGBColorSpace;
    const moon = new THREE.Mesh(
        new THREE.SphereGeometry(45, 32, 32),
        new THREE.MeshStandardMaterial({ map: moonTex })
    );
    moon.position.x = 450;
    moon.castShadow = true; moon.receiveShadow = true;
    moonOrbit.add(moon);

    // --- RAYCASTER (CLICK TO MAP) ---
    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let isMoving = false;
    let startPos = new THREE.Vector2();

    renderer.domElement.addEventListener('pointerdown', (e) => { startPos.set(e.clientX, e.clientY); isMoving = false; });
    renderer.domElement.addEventListener('pointermove', (e) => { if(startPos.distanceTo(new THREE.Vector2(e.clientX, e.clientY)) > 10) isMoving = true; });
    renderer.domElement.addEventListener('pointerup', (e) => {
        // Prevent clicking earth when store is visible
        if (!isMoving && window.viewportActive) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            if(raycaster.intersectObject(earth, true).length > 0) openMap();
        }
    });

    // --- TIMELINE ---
    const clock = new THREE.Clock();
    window.eventActive = false;

    function animate() {
        requestAnimationFrame(animate);
        const cycle = clock.getElapsedTime() % 90;
        const alert = document.getElementById('eclipse-alert');

        sun.rotation.y += 0.001;
        earth.rotation.y += 0.003;
        moonOrbit.rotation.y += 0.005;
        earthOrbit.rotation.y += 0.0005;

        let earthWP = new THREE.Vector3(); earth.getWorldPosition(earthWP);
        let zoomPos = earthWP.clone().add(new THREE.Vector3(0, 500, 2000));
        let panPos = earthWP.clone().add(new THREE.Vector3(1500, 1000, 2500));

        if (cycle < 30) {
            moonOrbit.rotation.y = Math.PI/2 + (cycle/30) * Math.PI;
            if (cycle > 7.5 && cycle < 22.5) {
                window.eventActive = true;
                alert.innerText = "TOTAL SOLAR ECLIPSE"; alert.className = "alert-box active";
                sunLight.intensity = THREE.MathUtils.lerp(sunLight.intensity, 1, 0.05);
                sun.material.opacity = THREE.MathUtils.lerp(sun.material.opacity, 0.2, 0.05); 
                camera.position.lerp(zoomPos, 0.05); controls.target.lerp(earthWP, 0.05);
            } else { 
                window.eventActive = false; alert.classList.remove('active', 'blood');
                sun.material.opacity = THREE.MathUtils.lerp(sun.material.opacity, 1, 0.05);
            }
            moon.material.emissiveIntensity = 0;
        } else if (cycle < 60) {
            moonOrbit.rotation.y = 1.5*Math.PI + ((cycle-30)/30) * Math.PI;
            if (cycle > 37.5 && cycle < 52.5) {
                window.eventActive = true;
                alert.innerText = "LUNAR ECLIPSE"; alert.className = "alert-box active";
                camera.position.lerp(zoomPos, 0.05); controls.target.lerp(earthWP, 0.05);
            } else { window.eventActive = false; alert.classList.remove('active'); }
            sunLight.intensity = THREE.MathUtils.lerp(sunLight.intensity, 8, 0.05);
        } else {
            moonOrbit.rotation.y = Math.PI/2 - ((cycle-60)/30) * Math.PI;
            if (cycle > 67.5 && cycle < 82.5) {
                window.eventActive = true;
                alert.innerText = "BLOOD MOON SEQUENCE"; alert.className = "alert-box blood active";
                moon.material.emissive = new THREE.Color(0xff0000); moon.material.emissiveIntensity = 1;
                camera.position.lerp(panPos, 0.02); controls.target.lerp(earthWP, 0.02);
            } else { window.eventActive = false; alert.classList.remove('active', 'blood'); moon.material.emissiveIntensity = 0; }
        }

        if(!window.eventActive) updateCamera();
        
        // Fix: ALWAYS call controls.update() so the camera turns to look at its target
        controls.update();
        
        composer.render();
    }
    animate();

    window.toggleOrbitalControls = (enable) => { controls.enabled = enable; };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

<script>
    // --- STORE LOGIC & STATE MANAGEMENT ---
    let allProducts = [], cart = [], selectedSize = null, activeProduct = null;
    window.viewportActive = false;

    window.ignite = () => {
        document.getElementById('kraken-lander').style.transform = 'translateY(-100%)';
        setTimeout(() => {
            document.getElementById('ui-layer').style.opacity = '1';
            document.getElementById('store-grid').style.display = 'grid';
            setTimeout(() => document.getElementById('store-grid').style.opacity = '1', 50);
            fetchStore();
        }, 500);
    };

    async function fetchStore() {
        try {
            const res = await fetch('/api/artemis-2.js');
            const data = await res.json();
            allProducts = data.products || [];
            renderGrid();
        } catch (e) { 
            console.error("API Link Severed - Using Fallback"); 
            allProducts = Array(8).fill({ name: "OLYMPIAN ARTIFACT", images: ["https://via.placeholder.com/400x500/001a33/00f2ff?text=SECURED+ASSET"] });
            renderGrid();
        }
    }

    function renderGrid() {
        const grid = document.getElementById('store-grid');
        grid.innerHTML = allProducts.slice(0, 24).map(p => `
            <div class="card" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
                <div class="grid-label">${p.name.split('Prompt:')[1] || p.name}</div>
            </div>`).join('');
    }

    window.toggleViewport = () => {
        window.viewportActive = !window.viewportActive;
        window.toggleOrbitalControls(window.viewportActive);
        
        const grid = document.getElementById('store-grid');
        if (window.viewportActive) {
            grid.style.opacity = '0';
            setTimeout(() => grid.style.display = 'none', 500);
            document.getElementById('viewport-btn').innerText = "EXIT VIEWPORT 🪐";
        } else {
            grid.style.display = 'grid';
            setTimeout(() => grid.style.opacity = '1', 50);
            document.getElementById('viewport-btn').innerText = "VIEWPORT 🪐";
        }
    };

    window.customDesign = () => {
        window.location.href = "mailto:stakeme10000@gmail.com?subject=Olympian%20Custom%20Design%20Inquiry";
    };

    // --- MODAL & CART LOGIC ---
    window.openModal = (name, img) => {
        activeProduct = { name, img }; selectedSize = null;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; mix-blend-mode:screen; filter:drop-shadow(0 0 15px var(--bio-high));">`;
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.selectSize = (btn, size) => { 
        selectedSize = size; 
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected')); 
        btn.classList.add('selected'); 
    };
    
    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
    window.toggleCart = (show) => document.getElementById('side-cart').classList.toggle('open', show);
    
    window.addToCart = () => {
        if(!selectedSize) return alert("SELECT SIZE");
        cart.push({...activeProduct, size: selectedSize});
        
        document.getElementById('cart-count').innerText = cart.length;
        document.getElementById('visual-stack').innerHTML = cart.map(() => `<div class="hoodie-fold"></div>`).join('');
        
        document.getElementById('cart-items').innerHTML = cart.map(i => `
            <div style="padding:10px 0; border-bottom:1px solid rgba(0, 242, 255, 0.3); display: flex; align-items: center; gap: 10px;">
                <img src="${i.img}" style="width: 40px; height: 40px; object-fit: contain;">
                <div>
                    <div style="font-size: 0.65rem;">${i.name}</div>
                    <div style="color:var(--bio-high); margin-top: 4px; font-weight:bold;">SIZE: ${i.size}</div>
                </div>
            </div>`).join('');
        
        closeModal(); toggleCart(true);
    };

    // --- MAP HOLOFRAME LOGIC ---
    window.openMap = () => {
        const frame = document.getElementById('map-holoframe');
        const glass = document.getElementById('map-glass');
        // Real Google Maps Satellite Embed Link
        document.getElementById('map-iframe').src = "https://maps.google.com/maps?q=Earth&t=k&z=2&ie=UTF8&iwloc=&output=embed";
        
        frame.style.display = 'flex';
        setTimeout(() => { frame.style.opacity = '1'; glass.style.transform = 'scale(1)'; }, 50);
    };

    window.closeMapHoloframe = () => {
        const frame = document.getElementById('map-holoframe');
        const glass = document.getElementById('map-glass');
        frame.style.opacity = '0'; glass.style.transform = 'scale(0.95)';
        setTimeout(() => { frame.style.display = 'none'; document.getElementById('map-iframe').src = ""; }, 400);
    };
</script>

<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch((err) => console.log('Service Worker Failed: ', err));
        });
    }
</script>
</body>
</html>
