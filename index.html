<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // V1 CORE</title>
    <style>
        :root { 
            --neon: #00f2ff; 
            --bg: #000; 
            --bio-high: #00f2ff; 
            --bio-low: #001a33; 
            --fire: #ff4500;
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; color: var(--neon); font-family: 'Courier New', monospace; text-transform: uppercase; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        /* --- KRAKEN LANDER --- */
        #kraken-lander {
            position: fixed; inset: 0; z-index: 5000; background: #000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1);
        }
        .lander-card {
            width: 90%; max-width: 400px; text-align: center; border: 1px solid var(--neon);
            padding: 40px; background: rgba(0, 26, 51, 0.8); backdrop-filter: blur(10px);
        }
        .kraken-btn {
            display: block; background: var(--neon); color: #000; padding: 15px;
            text-decoration: none; font-weight: bold; margin-bottom: 20px;
            letter-spacing: 2px; box-shadow: 0 0 20px var(--neon);
        }

        /* --- UI LAYER --- */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; opacity: 0; transition: opacity 1s; }
        header, footer { display: flex; justify-content: space-between; pointer-events: auto; align-items: center;}
        
        #store-grid { 
            position: relative; z-index: 10; display: grid;
            grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 100%; max-width: 1200px; margin: 0 auto;
            height: 60vh; overflow-y: auto; scrollbar-width: none;
            pointer-events: auto;
        }
        #store-grid::-webkit-scrollbar { display: none; }

        .card { 
            background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.8 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(5px); transition: 0.3s;
        }
        .card:hover { border-color: var(--neon); box-shadow: 0 0 15px var(--neon); }
        .card img { width: 85%; mix-blend-mode: screen; }

        .btn-core { border: 1px solid var(--neon); background: rgba(0,0,0,0.5); color: var(--neon); padding: 12px 24px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px; backdrop-filter: blur(5px); transition: 0.3s; text-decoration: none; }
        
        /* --- CART STACK --- */
        #cart-trigger { display: flex; align-items: center; gap: 12px; cursor: pointer; pointer-events: auto; }
        .cart-icon-wrapper { position: relative; width: 30px; height: 30px; }
        .hoodie-stack { position: absolute; bottom: 0; width: 20px; height: 4px; background: var(--neon); border: 1px solid #000; transition: 0.3s; }

        /* --- MODAL & SIDEBAR --- */
        #modal-overlay { position: fixed; inset: 0; z-index: 1000; display: none; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal-content { width: 90%; max-width: 400px; border: 1px solid var(--neon); background: #000; padding: 20px; }
        #side-cart { position: fixed; top: 0; right: -100%; width: 350px; height: 100%; background: #000; border-left: 1px solid var(--neon); z-index: 2000; transition: 0.4s; pointer-events: auto; }
        #side-cart.open { right: 0; }
        .pay-link { display: block; width: 90%; margin: 10px auto; padding: 15px; text-align: center; font-size: 0.8rem; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="kraken-lander">
    <div class="lander-card">
        <div style="font-size: 0.8rem; letter-spacing: 5px; margin-bottom: 30px;">IDENTITY VERIFIED</div>
        <a href="https://invite.kraken.com/JDNW/anm1u9c0" target="_blank" class="kraken-btn">CLAIM KRAKEN BTC</a>
        <button class="btn-core" style="width: 100%;" onclick="ignite()">ENTER SOLAR CORE</button>
    </div>
</div>

<div id="ui-layer">
    <header>
        <div style="letter-spacing: 5px; font-weight: bold;">OLYMPIAN // HUB</div>
        <div id="cart-trigger" onclick="toggleCart(true)">
            <div class="cart-icon-wrapper" id="visual-stack"></div>
            <span style="font-size: 0.7rem;">CART MANIFEST (<span id="count">0</span>)</span>
        </div>
    </header>

    <div id="store-grid"></div>
    
    <footer>
        <button class="btn-core" onclick="toggleViewport()">TOGGLE VIEWPORT 🪐</button>
        <div style="font-size: 0.6rem; letter-spacing: 2px;">SECTOR: SOLAR_CORE_V1</div>
        <button class="btn-core" onclick="window.open('https://buy.stripe.com/4gMaEWdE3dha4GUgBAcIE01','_blank')">STRIPE</button>
    </footer>
</div>

<div id="side-cart">
    <div style="padding:20px; border-bottom:1px solid var(--neon); display:flex; justify-content:space-between;">
        <span>CART MANIFEST</span>
        <span onclick="toggleCart(false)" style="cursor:pointer;">×</span>
    </div>
    <div id="cart-items" style="padding:20px; font-size:0.7rem;"></div>
    <div style="position:absolute; bottom:20px; width:100%;">
        <a href="https://nowpayments.io/payment/?iid=6087329696" class="pay-link" style="background:var(--fire); color:#fff;" target="_blank">CRYPTO CHECKOUT</a>
    </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-img-container" style="text-align:center;"></div>
        <div id="modal-title" style="text-align:center; margin: 15px 0; font-size: 0.8rem;"></div>
        <div id="size-options" style="display:grid; grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 20px;"></div>
        <button onclick="addToCart()" style="width:100%; padding:15px; background:var(--neon); color:#000; border:none; font-weight:bold; cursor:pointer;">UPLOAD TO MANIFEST</button>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- ENGINE INIT ---
    let scene, camera, renderer, composer, controls, bodies = [];
    const loader = new THREE.TextureLoader();
    const assetPath = './assets/';

    function init() {
        scene = new THREE.Scene();
        camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50000);
        renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.enabled = false;
        camera.position.set(0, 2000, 5000);

        // Bloom Pass
        const renderPass = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.4, 0.7, 0.1);
        composer = new EffectComposer(renderer);
        composer.addPass(renderPass);
        composer.addPass(bloomPass);

        // Starfield
        const starGeo = new THREE.BufferGeometry();
        const starCount = 15000;
        const posArray = new Float32Array(starCount * 3);
        for(let i=0; i<starCount*3; i++) posArray[i] = (Math.random()-0.5)*30000;
        starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color: 0xffffff, size: 1.2})));

        // Celestial Setup
        const sun = new THREE.Mesh(new THREE.SphereGeometry(500, 64, 64), new THREE.MeshBasicMaterial({map: loader.load(assetPath+'8k_sun.jpg')}));
        scene.add(sun);

        const TIER = { BRIGHT: {em: 0x44ccff, int: 0.8}, PLANET: {em: 0x222222, int: 0.3} };

        function spawn(size, tex, dist, speed, tier, ring = null) {
            const pivot = new THREE.Group();
            scene.add(pivot);
            const mesh = new THREE.Mesh(new THREE.SphereGeometry(size, 64, 64), new THREE.MeshStandardMaterial({
                map: loader.load(assetPath+tex), emissive: new THREE.Color(tier.em), emissiveIntensity: tier.int
            }));
            mesh.position.x = dist;
            pivot.add(mesh);
            if(ring) {
                const r = new THREE.Mesh(new THREE.RingGeometry(size*1.8, size*3.2, 64), new THREE.MeshBasicMaterial({map: loader.load(assetPath+ring), side: THREE.DoubleSide, transparent: true}));
                r.rotation.x = Math.PI/2; mesh.add(r);
            }
            bodies.push({pivot, mesh, speed});
            return mesh;
        }

        spawn(28, '8k_mercury.jpg', 900, 0.012, TIER.PLANET);
        spawn(60, '8k_venus_surface.jpg', 1350, 0.009, TIER.BRIGHT);
        const earth = spawn(70, '8k_earth_nightmap.jpg', 1900, 0.006, TIER.BRIGHT);
        const moon = new THREE.Mesh(new THREE.SphereGeometry(16, 32, 32), new THREE.MeshStandardMaterial({map: loader.load(assetPath+'8k_moon.jpg'), emissive: 0xffffff, emissiveIntensity: 0.4}));
        moon.position.x = 140; earth.add(moon);
        spawn(180, '8k_jupiter.jpg', 3500, 0.002, TIER.PLANET);
        spawn(155, '8k_saturn.jpg', 4600, 0.001, TIER.PLANET, '8k_saturn_ring_alpha.png');

        scene.add(new THREE.PointLight(0xffffff, 10, 25000));
        scene.add(new THREE.AmbientLight(0xffffff, 0.05));

        animate();
    }

    function animate() {
        requestAnimationFrame(animate);
        bodies.forEach(b => { b.pivot.rotation.y += b.speed; b.mesh.rotation.y += 0.004; });
        if(controls.enabled) controls.update();
        composer.render();
    }

    window.toggleViewport = () => {
        controls.enabled = !controls.enabled;
        document.getElementById('store-grid').style.opacity = controls.enabled ? '0' : '1';
        document.getElementById('store-grid').style.pointerEvents = controls.enabled ? 'none' : 'auto';
    };

    window.ignite = () => {
        document.getElementById('kraken-lander').style.transform = 'translateY(-100%)';
        document.getElementById('ui-layer').style.opacity = '1';
        fetchStore();
    };

    init();
</script>

<script>
    let allProducts = [], cart = [], selectedSize = null, activeProduct = null;

    async function fetchStore() {
        try {
            const res = await fetch('/api/artemis-2.js');
            const data = await res.json();
            allProducts = data.products || [];
            renderGrid();
        } catch (e) { console.error("Sync Interrupted"); }
    }

    function renderGrid() {
        const grid = document.getElementById('store-grid');
        grid.innerHTML = allProducts.slice(0, 24).map(p => `
            <div class="card" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
            </div>`).join('');
    }

    window.openModal = (name, img) => {
        activeProduct = { name, img };
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; mix-blend-mode:screen;">`;
        document.getElementById('modal-title').innerText = name;
        document.getElementById('size-options').innerHTML = ['S','M','L','XL','2XL'].map(s => `<button class="btn-core" onclick="selectSize(this,'${s}')">${s}</button>`).join('');
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.selectSize = (btn, size) => {
        selectedSize = size;
        document.querySelectorAll('#size-options button').forEach(b => b.style.background = 'transparent');
        btn.style.background = 'var(--neon)';
        btn.style.color = '#000';
    }

    window.addToCart = () => {
        if(!selectedSize) return alert("SELECT SIZE");
        cart.push({...activeProduct, size: selectedSize});
        updateCartUI();
        closeModal();
    };

    function updateCartUI() {
        document.getElementById('count').innerText = cart.length;
        const stack = document.getElementById('visual-stack');
        stack.innerHTML = cart.map((_, i) => `<div class="hoodie-stack" style="bottom:${i*3}px"></div>`).join('');
        document.getElementById('cart-items').innerHTML = cart.map(i => `
            <div style="margin-bottom:10px; border-bottom:1px solid #222; padding-bottom:5px;">
                ${i.name} - <span style="color:var(--neon)">${i.size}</span>
            </div>`).join('');
    }

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
    window.toggleCart = (show) => document.getElementById('side-cart').classList.toggle('open', show);
</script>
</body>
</html>
