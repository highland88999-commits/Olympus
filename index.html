<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN | AXIOM 24</title>
    <style>
        :root { 
            --fire: #ff4500; 
            --spark: #ffae00; 
            --bio-low: #001a33; 
            --bio-high: #00f2ff; 
            --cyan-bloom: rgba(0, 255, 255, 0.15); 
            --cyan-border: rgba(0, 255, 255, 0.4); 
        }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; font-family: 'Courier New', monospace; color: white; overflow: hidden; text-transform: uppercase; }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        
        /* --- 1. KRAKEN LANDING OVERLAY --- */
        #kraken-lander {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px);
            z-index: 5000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1), opacity 1s;
        }
        .lander-card {
            width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--bio-high);
            padding: 40px; background: rgba(0, 26, 51, 0.6); box-shadow: 0 0 30px var(--bio-low);
        }
        .kraken-btn {
            display: block; background: var(--bio-high); color: #000; padding: 18px;
            text-decoration: none; font-weight: bold; margin-bottom: 25px;
            letter-spacing: 2px; box-shadow: 0 0 20px var(--bio-high); transition: 0.3s;
        }
        .kraken-btn:hover { transform: scale(1.02); }
        .btn-core {
            background: transparent; border: 1px solid var(--bio-high); color: var(--bio-high);
            padding: 12px 24px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px;
            backdrop-filter: blur(5px); transition: 0.3s; text-decoration: none; width: 100%; box-sizing: border-box;
        }
        .btn-core:hover { background: var(--bio-high); color: #000; }

        /* --- 2. UI LAYER (HIDDEN INITIALLY) --- */
        .ui-element { transition: opacity 0.8s ease; opacity: 0; display: none; }
        
        header { position: relative; z-index: 100; height: 70px; align-items: center; justify-content: space-between; padding: 0 30px; background: linear-gradient(to bottom, rgba(0,0,0,0.9), transparent); border-bottom: 1px solid var(--bio-high); }
        h1 { letter-spacing: 5px; color: var(--bio-high); text-shadow: 0 0 15px var(--bio-high); font-size: 1rem; margin: 0; }

        /* CART MANIFEST & STACK */
        #cart-trigger { display: flex; align-items: center; gap: 10px; color: var(--bio-high); border: 1px solid var(--bio-high); padding: 8px 15px; font-size: 0.8rem; cursor: pointer; background: rgba(0, 242, 255, 0.05); }
        .cart-icon-wrapper { position: relative; width: 20px; height: 20px; display: flex; align-items: flex-end; justify-content: center; }
        #visual-stack { display: flex; flex-direction: column-reverse; gap: 2px; width: 100%; position: absolute; bottom: 0; }
        .hoodie-fold { width: 100%; height: 4px; background: var(--bio-high); border-radius: 1px; box-shadow: 0 0 5px var(--bio-high); }

        #store-grid { 
            position: relative; z-index: 5; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 95%; max-width: 1000px; margin: 15px auto 0 auto; 
            height: calc(100vh - 185px); overflow-y: auto; scrollbar-width: none; padding-bottom: 10px; pointer-events: auto;
        }

        .card { 
            position: relative; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.8 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px var(--bio-low); transition: 0.3s; backdrop-filter: blur(5px);
        }
        .card:hover { border-color: var(--bio-high); box-shadow: 0 0 20px var(--bio-high); }
        .card img { width: 85%; height: 85%; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 8px var(--bio-high)); }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,26,51,0.9); font-size: 0.55rem; text-align: center; padding: 6px 0; color: var(--bio-high); border-top: 1px solid var(--bio-high); }

        footer {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); z-index: 150; 
            align-items: center; justify-content: space-between; padding: 0 30px; box-sizing: border-box;
            border-top: 1px solid var(--bio-high); pointer-events: auto;
        }

        .slider-wrapper { flex-grow: 1; display: flex; flex-direction: column; align-items: center; max-width: 40%; }
        .sector-slider { width: 100%; accent-color: var(--bio-high); cursor: pointer; }
        #sector-display { font-size: 0.7rem; color: var(--bio-high); margin-bottom: 5px; letter-spacing: 2px; }

        /* --- 3. MODALS, HOLOFRAME & SIDE CART --- */
        #holoframe-container { position: fixed; top: 10%; left: 5%; width: 90%; height: 75%; z-index: 9999; display: none; opacity: 0; transform: scale(0.9); transition: all 0.4s ease; pointer-events: auto; }
        .glass-frame { width: 100%; height: 100%; background: #000; border: 2px solid var(--bio-high); border-radius: 5px; box-shadow: 0 0 50px var(--bio-low); overflow: hidden; position: relative; }
        .close-holo { position: absolute; top: -15px; right: -10px; color: var(--bio-high); font-size: 2.5rem; cursor: pointer; z-index: 10001; font-weight: bold; }

        #modal-overlay { position: fixed; inset: 0; z-index: 6000; display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); align-items: center; justify-content: center; pointer-events: auto; }
        .modal-content { width: 90%; max-width: 420px; background: #000; border: 2px solid var(--bio-high); position: relative; padding-bottom: 20px; }
        .close-modal { position: absolute; top: 5px; right: 15px; font-size: 2rem; color: var(--bio-high); cursor: pointer; z-index: 100; }
        .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 20px; }
        .size-btn { border: 1px solid var(--bio-high); background: #000; color: #fff; padding: 12px 0; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .size-btn.selected { background: var(--bio-high); color: #000; font-weight: bold; }
        
        #side-cart { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #000; border-left: 1px solid var(--bio-high); z-index: 7000; transition: 0.4s; pointer-events: auto; }
        #side-cart.open { right: 0; }
        .pay-link { display: block; width: 90%; margin: 10px auto; padding: 15px 0; text-align: center; font-size: 0.8rem; text-decoration: none; font-weight: bold; letter-spacing: 2px; }
    </style>
</head>
<body ondblclick="closeModal(); toggleCart(false)">

<div id="kraken-lander">
    <div class="lander-card">
        <div style="font-size: 0.7rem; letter-spacing: 5px; margin-bottom: 25px; color: var(--bio-high);">SECURE CONNECTION ESTABLISHED</div>
        <a href="https://invite.kraken.com/JDNW/anm1u9c0" target="_blank" class="kraken-btn">CLAIM 200 CAD BTC REWARD</a>
        <button class="btn-core" onclick="enterSystem()">INITIALIZE SOLAR CORE</button>
    </div>
</div>

<header id="ui-header" class="ui-element">
    <h1>OLYMPIAN</h1>
    <div id="cart-trigger" onclick="toggleCart(true)">
        <div class="cart-icon-wrapper">
            🛒
            <div id="visual-stack"></div>
        </div>
        <span>CART MANIFEST (<span id="cart-count">0</span>)</span>
    </div>
</header>

<div id="store-grid" class="ui-element"></div>

<footer id="ui-footer" class="ui-element">
    <button class="btn-core" onclick="toggleHoloframe()" style="width: auto;">CUSTOM DESIGN</button>

    <div class="slider-wrapper">
        <div id="sector-display">SYNCING...</div>
        <input type="range" id="sector-slider" class="sector-slider" min="1" max="1" value="1">
    </div>

    <button class="btn-core" onclick="toggleViewport()" style="width: auto;" id="viewport-btn">VIEWPORT 🪐</button>
</footer>

<div id="holoframe-container">
    <span class="close-holo" onclick="toggleHoloframe()">×</span>
    <div class="glass-frame">
        <iframe src="https://georgia-aquarium.vercel.app/" style="width:100%; height:100%; border:none;"></iframe>
    </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div id="modal-img-container" style="padding:15px;"></div>
        <div style="padding:0 20px;">
            <div id="modal-title" style="color:var(--bio-high); font-size:0.8rem; margin-bottom:10px; text-align:center;"></div>
            <div class="size-grid">
                <button class="size-btn" onclick="selectSize(this, 'S')">S</button>
                <button class="size-btn" onclick="selectSize(this, 'M')">M</button>
                <button class="size-btn" onclick="selectSize(this, 'L')">L</button>
                <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
                <button class="size-btn" onclick="selectSize(this, '2XL')">2XL</button>
                <button class="size-btn" onclick="selectSize(this, '3XL')">3XL</button>
                <button class="size-btn" onclick="selectSize(this, '4XL')">4XL</button>
                <button class="size-btn" onclick="selectSize(this, '5XL')">5XL</button>
                <button class="size-btn" onclick="selectSize(this, '6XL')">6XL</button>
            </div>
            <button class="btn-core" style="width:100%; margin-top: 10px; background:var(--bio-high); color:#000;" onclick="addToCart()">UPLOAD TO MANIFEST</button>
        </div>
    </div>
</div>

<div id="side-cart">
    <div style="padding:20px; border-bottom:1px solid var(--bio-high); display:flex; justify-content:space-between; align-items: center;">
        <span style="color:var(--bio-high); letter-spacing: 2px;">CART MANIFEST</span>
        <span onclick="toggleCart(false)" style="cursor:pointer; font-size: 1.5rem; color: var(--bio-high);">×</span>
    </div>
    <div id="cart-items" style="padding:20px; font-size:0.75rem; color: #fff; overflow-y: auto; height: calc(100% - 180px);"></div>
    <div style="position:absolute; bottom:20px; width:100%;">
        <a href="https://buy.stripe.com/4gMaEWdE3dha4GUgBAcIE01" class="pay-link" style="background:#fff; color:#000;" target="_blank">STRIPE SECURE</a>
        <a href="https://nowpayments.io/payment/?iid=6087329696" class="pay-link" style="background:var(--fire); color:#fff;" target="_blank">CRYPTO CHECKOUT</a>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- 1. CORE ENGINE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 40000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enabled = false; // Disabled while in store
    camera.position.set(0, 2000, 5000);
    controls.target.set(0, 0, 0);

    const loader = new THREE.TextureLoader();
    const assetPath = './assets/';

    // --- 2. TIERED BLOOM ---
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.1; bloomPass.strength = 1.4; bloomPass.radius = 0.7;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    const TIER = {
        SUN: { em: 0xffffff, int: 2.0 },
        BRIGHT: { em: 0x44ccff, int: 0.8 },
        PLANET: { em: 0x222222, int: 0.3 }
    };

    // --- 3. PROCEDURAL STARS ---
    const starGeo = new THREE.BufferGeometry();
    const starCount = 15000;
    const posArray = new Float32Array(starCount * 3);
    for(let i=0; i < starCount * 3; i++) { posArray[i] = (Math.random() - 0.5) * 30000; }
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const stars = new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 1.1, sizeAttenuation: true }));
    scene.add(stars);

    // --- 4. PLANETARY SYSTEM (REPO SYNC) ---
    const sun = new THREE.Mesh(new THREE.SphereGeometry(500, 64, 64), new THREE.MeshBasicMaterial({ map: loader.load(assetPath + '8k_sun.jpg') }));
    scene.add(sun);

    const bodies = [];
    function spawn(size, tex, dist, speed, tier, ring = null) {
        const pivot = new THREE.Group();
        scene.add(pivot);
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(size, 64, 64),
            new THREE.MeshStandardMaterial({ map: loader.load(assetPath + tex), emissive: new THREE.Color(tier.em), emissiveIntensity: tier.int })
        );
        mesh.position.x = dist;
        pivot.add(mesh);
        if(ring) {
            const r = new THREE.Mesh(new THREE.RingGeometry(size*1.8, size*3.2, 64), new THREE.MeshBasicMaterial({ map: loader.load(assetPath + ring), side: THREE.DoubleSide, transparent: true }));
            r.rotation.x = Math.PI/2; mesh.add(r);
        }
        bodies.push({ pivot, mesh, speed });
        return mesh;
    }

    spawn(28, '8k_mercury.jpg', 900, 0.012, TIER.PLANET);
    spawn(60, '8k_venus_surface.jpg', 1350, 0.009, TIER.BRIGHT);
    const earth = spawn(70, '8k_earth_nightmap.jpg', 1900, 0.006, TIER.BRIGHT);
    const moon = new THREE.Mesh(new THREE.SphereGeometry(16, 32, 32), new THREE.MeshStandardMaterial({ map: loader.load(assetPath + '8k_moon.jpg'), emissive: 0xffffff, emissiveIntensity: 0.4 }));
    moon.position.x = 140; earth.add(moon);
    spawn(40, '8k_mars.jpg', 2500, 0.005, TIER.PLANET);
    spawn(180, '8k_jupiter.jpg', 3500, 0.002, TIER.PLANET);
    spawn(155, '8k_saturn.jpg', 4600, 0.001, TIER.PLANET, '8k_saturn_ring_alpha.png');
    spawn(95, '2k_uranus.jpg', 5600, 0.0007, TIER.PLANET);
    spawn(90, '2k_neptune.jpg', 6500, 0.0005, TIER.PLANET);

    scene.add(new THREE.PointLight(0xffffff, 10, 25000));
    scene.add(new THREE.AmbientLight(0xffffff, 0.05));

    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.001;
        stars.rotation.y += 0.00003;
        bodies.forEach(b => { b.pivot.rotation.y += b.speed; b.mesh.rotation.y += 0.004; });
        if(controls.enabled) controls.update();
        composer.render();
    }
    animate();

    // --- 5. GLOBAL UI BINDINGS ---
    window.toggleViewport = () => {
        controls.enabled = !controls.enabled;
        const state = controls.enabled ? '0' : '1';
        const pointer = controls.enabled ? 'none' : 'auto';
        document.getElementById('ui-header').style.opacity = state;
        document.getElementById('store-grid').style.opacity = state;
        document.getElementById('store-grid').style.pointerEvents = pointer;
        document.getElementById('viewport-btn').innerText = controls.enabled ? "EXIT VIEWPORT" : "VIEWPORT 🪐";
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

<script>
    // --- UI & STORE LOGIC ---
    let allProducts = [], cart = [], itemsPerPage = 24, selectedSize = null, activeProduct = null;

    function enterSystem() {
        const lander = document.getElementById('kraken-lander');
        lander.style.transform = 'translateY(-100%)';
        lander.style.opacity = '0';
        
        setTimeout(() => {
            lander.style.display = 'none';
            document.querySelectorAll('.ui-element').forEach(el => {
                el.style.display = (el.tagName === 'DIV') ? 'grid' : 'flex';
                setTimeout(() => el.style.opacity = '1', 50);
            });
            fetchStore();
        }, 1000);
    }

    async function fetchStore() {
        try {
            const res = await fetch('/api/artemis-2.js');
            const data = await res.json();
            if (data.products) { 
                allProducts = data.products; 
                setupNavigation();
                renderGrid(1); 
            }
        } catch (e) { 
            document.getElementById('sector-display').innerText = "API LINK SEVERED"; 
            // Fallback for visual testing
            allProducts = Array(12).fill({ name: "OLYMPIAN DEFAULT", images: ["https://via.placeholder.com/400x500/001a33/00f2ff?text=SECURED+ASSET"] });
            setupNavigation(); renderGrid(1);
        }
    }

    function setupNavigation() {
        const slider = document.getElementById('sector-slider');
        const display = document.getElementById('sector-display');
        const totalPages = Math.ceil(allProducts.length / itemsPerPage) || 1;
        slider.max = totalPages;
        display.innerText = `SECTOR 01 / ${totalPages.toString().padStart(2, '0')}`;
        slider.oninput = (e) => {
            display.innerText = `SECTOR ${e.target.value.padStart(2, '0')} / ${totalPages.toString().padStart(2, '0')}`;
            renderGrid(parseInt(e.target.value));
        };
    }

    function renderGrid(page) {
        const grid = document.getElementById('store-grid');
        const start = (page - 1) * itemsPerPage;
        const items = allProducts.slice(start, start + itemsPerPage);
        grid.innerHTML = items.map(p => `
            <div class="card" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
                <div class="grid-label">${p.name.split('Prompt:')[1] || p.name}</div>
            </div>`).join('');
        grid.scrollTop = 0;
    }

    window.openModal = (name, img) => {
        activeProduct = { name, img }; selectedSize = null;
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; mix-blend-mode:screen; filter:drop-shadow(0 0 15px var(--bio-high));">`;
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.selectSize = (btn, size) => { 
        selectedSize = size; 
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('selected')); 
        btn.classList.add('selected'); 
    };
    
    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
    window.toggleCart = (show) => document.getElementById('side-cart').classList.toggle('open', show);
    
    window.addToCart = () => {
        if(!selectedSize) return alert("SELECT SIZE");
        cart.push({...activeProduct, size: selectedSize});
        
        // Update Stack & Count
        document.getElementById('cart-count').innerText = cart.length;
        const stack = document.getElementById('visual-stack');
        stack.innerHTML = cart.map(() => `<div class="hoodie-fold"></div>`).join('');
        
        // Update Cart Sidebar
        document.getElementById('cart-items').innerHTML = cart.map(i => `
            <div style="padding:10px 0; border-bottom:1px solid rgba(0, 242, 255, 0.3); display: flex; align-items: center; gap: 10px;">
                <img src="${i.img}" style="width: 40px; height: 40px; object-fit: contain;">
                <div>
                    <div>${i.name}</div>
                    <div style="color:var(--bio-high); margin-top: 4px;">SIZE: ${i.size}</div>
                </div>
            </div>`).join('');
        
        closeModal(); 
        toggleCart(true);
    };

    window.toggleHoloframe = () => {
        const frame = document.getElementById('holoframe-container');
        if (frame.style.display === 'block') {
            frame.style.opacity = '0';
            frame.style.transform = 'scale(0.9)';
            setTimeout(() => { frame.style.display = 'none'; }, 400);
        } else {
            frame.style.display = 'block';
            setTimeout(() => { frame.style.opacity = '1'; frame.style.transform = 'scale(1)'; }, 10);
        }
    };
</script>
</body>
</html>
