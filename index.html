<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // SOLAR CORE</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--bg); overflow: hidden; color: var(--neon); font-family: 'Courier New', monospace; text-transform: uppercase; }
        canvas { position: fixed; top: 0; left: 0; z-index: 1; }
        
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px; box-sizing: border-box; }
        header, footer { display: flex; justify-content: space-between; pointer-events: auto; }
        
        .btn-core { border: 1px solid var(--neon); background: rgba(0,0,0,0.5); color: var(--neon); padding: 12px 24px; cursor: pointer; font-size: 0.7rem; letter-spacing: 3px; backdrop-filter: blur(5px); transition: 0.3s; text-decoration: none; }
        .btn-core:hover { background: var(--neon); color: #000; box-shadow: 0 0 15px var(--neon); }

        #gateway { position: fixed; inset: 0; z-index: 5000; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease; pointer-events: auto; }
        .hidden { opacity: 0 !important; pointer-events: none !important; }
    </style>
</head>
<body>

<div id="gateway">
    <div style="text-align:center;">
        <button class="btn-core" style="font-size: 1rem; padding: 20px 40px;" onclick="ignite()">IGNITE SOLAR CORE</button>
        <p style="font-size: 0.5rem; margin-top: 20px; letter-spacing: 2px; opacity: 0.5;">8K_ASSET_PIPELINE_STABLE</p>
    </div>
</div>

<div id="ui-layer" class="hidden">
    <header>
        <div style="letter-spacing: 5px; font-weight: bold;">OLYMPIAN // V1</div>
        <div id="manifest-count">MANIFEST (0)</div>
    </header>
    
    <footer>
        <a href="https://invite.kraken.com/JDNW/2yyr243k" target="_blank" class="btn-core">BTC REWARD</a>
        <button class="btn-core" onclick="location.reload()">RESET VIEWPORT</button>
    </footer>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // 1. SYSTEM INIT
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 40000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    camera.position.set(0, 1500, 4000);

    const loader = new THREE.TextureLoader();
    const assetPath = './assets/';

    // 2. TIERED BLOOM POST-PROCESSING
    const renderScene = new RenderPass(scene, camera);
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
    bloomPass.threshold = 0.15; // Lower threshold = more elements glow
    bloomPass.strength = 1.2;
    bloomPass.radius = 0.6;

    const composer = new EffectComposer(renderer);
    composer.addPass(renderScene);
    composer.addPass(bloomPass);

    // 3. PROCEDURAL STARFIELD (Zero Load Time)
    const starGeo = new THREE.BufferGeometry();
    const starCount = 15000;
    const posArray = new Float32Array(starCount * 3);
    for(let i=0; i < starCount * 3; i++) {
        posArray[i] = (Math.random() - 0.5) * 25000;
    }
    starGeo.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
    const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 1.2, sizeAttenuation: true });
    const stars = new THREE.Points(starGeo, starMat);
    scene.add(stars);

    // 4. THE SUN (TIER 1 BLOOM)
    const sunTex = loader.load(assetPath + '8k_sun.jpg');
    const sun = new THREE.Mesh(
        new THREE.SphereGeometry(450, 64, 64),
        new THREE.MeshBasicMaterial({ map: sunTex })
    );
    scene.add(sun);

    // 5. PLANETARY ENGINE
    const bodies = [];
    function addPlanet(size, texture, distance, speed, emissiveHex = 0x000000, emissiveInt = 0, ringTex = null) {
        const pivot = new THREE.Group();
        scene.add(pivot);
        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(size, 64, 64),
            new THREE.MeshStandardMaterial({ 
                map: loader.load(assetPath + texture),
                emissive: new THREE.Color(emissiveHex),
                emissiveIntensity: emissiveInt
            })
        );
        mesh.position.x = distance;
        pivot.add(mesh);
        
        if(ringTex) {
            const rings = new THREE.Mesh(
                new THREE.RingGeometry(size * 1.8, size * 3.2, 64),
                new THREE.MeshBasicMaterial({ map: loader.load(assetPath + ringTex), side: THREE.DoubleSide, transparent: true })
            );
            rings.rotation.x = Math.PI/2;
            mesh.add(rings);
        }
        bodies.push({ pivot, mesh, speed });
        return mesh;
    }

    // TIERED PLANETS (Aligned with Repo Assets)
    addPlanet(25, '8k_mercury.jpg', 800, 0.01);
    addPlanet(55, '8k_venus_surface.jpg', 1200, 0.008);
    
    // Earth & Moon (Tier 2 Bloom)
    const earth = addPlanet(65, '8k_earth_nightmap.jpg', 1700, 0.005, 0x44ccff, 0.4);
    const moon = new THREE.Mesh(
        new THREE.SphereGeometry(15, 32, 32),
        new THREE.MeshStandardMaterial({ 
            map: loader.load(assetPath + '8k_moon.jpg'),
            emissive: 0xffffff,
            emissiveIntensity: 0.2
        })
    );
    moon.position.x = 130;
    earth.add(moon);

    addPlanet(160, '8k_jupiter.jpg', 2800, 0.002);
    addPlanet(140, '8k_saturn.jpg', 3800, 0.001, 0x000000, 0, '8k_saturn_ring_alpha.png');

    // LIGHTING
    const pointLight = new THREE.PointLight(0xffffff, 6, 25000);
    scene.add(pointLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.1));

    // ANIMATION LOOP
    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.001;
        stars.rotation.y += 0.00005;
        bodies.forEach(b => {
            b.pivot.rotation.y += b.speed;
            b.mesh.rotation.y += 0.005;
        });
        controls.update();
        composer.render(); // Essential for Bloom
    }
    animate();

    // INTERFACE CONTROLS
    window.ignite = () => {
        document.getElementById('gateway').classList.add('hidden');
        document.getElementById('ui-layer').classList.remove('hidden');
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
        composer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
