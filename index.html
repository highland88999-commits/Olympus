<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="format-detection" content="telephone=no">
    <title>OLYMPUS | GRAND MULTIVERSE</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="./assets/icon-192.png">

    <style>
        :root { 
            --fire: #ff4500; --blood: #ff0033;
            --bio-low: #001a33; --bio-high: #00f2ff; 
            --mk-gold: #ffd700;
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; background: #000; 
            font-family: 'Courier New', monospace; color: white; overflow: hidden; text-transform: uppercase;
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: auto; outline: none; }
        
        /* --- KRAKEN LANDING --- */
        #kraken-lander {
            position: fixed; inset: 0; background: #000; z-index: 5000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: transform 1s cubic-bezier(0.85, 0, 0.15, 1); pointer-events: auto;
        }
        .lander-card {
            width: 90%; max-width: 420px; text-align: center; border: 1px solid var(--bio-high);
            padding: 40px; background: rgba(0, 26, 51, 0.6); box-shadow: 0 0 30px var(--bio-low);
        }
        .kraken-btn {
            display: block; background: var(--bio-high); color: #000; padding: 18px;
            text-decoration: none; font-weight: bold; margin-bottom: 25px; letter-spacing: 2px; box-shadow: 0 0 20px var(--bio-high); transition: 0.3s;
        }
        .btn-core {
            background: rgba(0,0,0,0.5); border: 1px solid var(--bio-high); color: var(--bio-high);
            padding: 12px 10px; cursor: pointer; font-size: 0.65rem; letter-spacing: 2px;
            backdrop-filter: blur(5px); transition: 0.3s; outline: none; text-align: center; width: 100%; box-sizing: border-box;
        }
        .btn-core:hover { background: var(--bio-high); color: #000; box-shadow: 0 0 15px var(--bio-high); }

        /* --- UI LAYER --- */
        #ui-layer { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 30px 20px; box-sizing: border-box; opacity: 0; transition: opacity 1s; }
        header { display: flex; justify-content: space-between; pointer-events: auto; align-items: center; }
        h1 { letter-spacing: 3px; color: var(--bio-high); text-shadow: 0 0 15px var(--bio-high); font-size: 0.9rem; margin: 0; }
        
        #ui-layer footer { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; pointer-events: auto; width: 100%; }

        /* STORE GRID */
        #store-grid { 
            position: relative; z-index: 5; grid-template-columns: repeat(2, 1fr); gap: 15px; 
            width: 100%; max-width: 1000px; margin: 20px auto 0 auto; 
            height: calc(100vh - 270px); 
            overflow-y: auto; scrollbar-width: none; pointer-events: auto;
            transition: opacity 0.5s ease; display: none; opacity: 0;
        }
        .card { 
            position: relative; background: rgba(0, 242, 255, 0.03); border: 1px solid rgba(0, 242, 255, 0.2);
            aspect-ratio: 0.8 / 1; cursor: pointer; display: flex; align-items: center; justify-content: center;
            box-shadow: inset 0 0 15px var(--bio-low); transition: 0.3s; backdrop-filter: blur(5px);
        }
        .card img { width: 85%; height: 85%; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 8px var(--bio-high)); }
        .grid-label { position: absolute; bottom: 0; width: 100%; background: rgba(0,26,51,0.9); font-size: 0.55rem; text-align: center; padding: 6px 0; color: var(--bio-high); border-top: 1px solid var(--bio-high); }

        #store-pagination {
            display: none; justify-content: center; align-items: center; gap: 15px;
            pointer-events: auto; margin-bottom: 15px; opacity: 0; transition: opacity 0.5s ease;
        }
        .btn-page {
            background: transparent; border: 1px solid var(--bio-high); color: var(--bio-high);
            padding: 8px 15px; cursor: pointer; font-family: 'Courier New', monospace;
            font-weight: bold; font-size: 0.7rem; transition: 0.3s;
        }
        .btn-page:hover:not(:disabled) { background: var(--bio-high); color: #000; }
        .btn-page:disabled { opacity: 0.3; cursor: not-allowed; border-color: rgba(0, 242, 255, 0.3); color: rgba(0, 242, 255, 0.3); }

        #cart-trigger { display: flex; align-items: center; gap: 10px; color: var(--bio-high); border: 1px solid var(--bio-high); padding: 8px 10px; font-size: 0.65rem; cursor: pointer; background: rgba(0, 242, 255, 0.05); }
        .cart-icon-wrapper { position: relative; width: 15px; height: 15px; display: flex; align-items: flex-end; justify-content: center; font-size: 0.8rem; }
        #visual-stack { display: flex; flex-direction: column-reverse; gap: 2px; width: 100%; position: absolute; bottom: 0; }
        .hoodie-fold { width: 100%; height: 3px; background: var(--bio-high); box-shadow: 0 0 5px var(--bio-high); }

        #hud-center { position: absolute; top: 20%; left: 50%; transform: translateX(-50%); text-align: center; pointer-events: none; width: 90%; max-width: 400px; z-index: 100; }
        .alert-box { border: 1px solid var(--bio-high); background: rgba(0, 242, 255, 0.1); color: var(--bio-high); padding: 15px 10px; font-weight: bold; letter-spacing: 3px; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); opacity: 0; transition: opacity 0.5s ease; margin-bottom: 15px; text-shadow: 0 0 10px; font-size: 0.8rem; }
        .alert-box.active { opacity: 1; animation: pulse 1s infinite; }
        .alert-box.blood { border-color: var(--blood); color: var(--blood); background: rgba(255, 0, 51, 0.1); box-shadow: 0 0 20px rgba(255, 0, 51, 0.4); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- MK KOMBAT TOWER (SIDEBAR OVERLAY) --- */
        #kombat-tower {
            position: absolute; left: 10px; top: 80px; width: 180px; z-index: 6500;
            display: none; flex-direction: column-reverse; gap: 8px; pointer-events: none;
        }
        .tower-step {
            background: rgba(0,0,0,0.8); border: 2px solid #444; color: #888;
            padding: 8px; font-size: 0.6rem; letter-spacing: 1px;
            clip-path: polygon(0% 0%, 100% 0%, 90% 100%, 0% 100%);
            transition: 0.5s;
        }
        .tower-step.active {
            border-color: var(--blood); color: var(--mk-gold);
            box-shadow: 0 0 15px var(--blood); transform: scale(1.05);
            background: linear-gradient(90deg, rgba(255,0,51,0.3), transparent);
        }

        /* --- SIDE CART MANIFEST --- */
        #side-cart { position: fixed; top: 0; right: -100%; width: 85%; max-width: 350px; height: 100%; background: #000; border-left: 1px solid var(--bio-high); z-index: 7000; transition: 0.4s; pointer-events: auto; }
        #side-cart.open { right: 0; }
        .pay-link { display: block; width: 90%; margin: 10px auto; padding: 15px 0; text-align: center; font-size: 0.8rem; text-decoration: none; font-weight: bold; letter-spacing: 2px; }

        /* --- ITEM MODAL --- */
        #modal-overlay { position: fixed; inset: 0; z-index: 6000; display: none; background: rgba(0,0,0,0.95); backdrop-filter: blur(12px); align-items: center; justify-content: center; pointer-events: auto; }
        .modal-content { width: 90%; max-width: 420px; background: #000; border: 2px solid var(--bio-high); position: relative; padding-bottom: 20px; }
        .close-modal { position: absolute; top: 5px; right: 15px; font-size: 2rem; color: var(--bio-high); cursor: pointer; z-index: 100; }
        .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin: 15px 20px; }
        .size-btn { border: 1px solid var(--bio-high); background: #000; color: #fff; padding: 12px 0; cursor: pointer; font-size: 0.7rem; transition: 0.2s; }
        .size-btn.selected { background: var(--bio-high); color: #000; font-weight: bold; }

        /* --- TRANSPARENT MAP HOLOFRAME --- */
        #map-holoframe { position: fixed; inset: 0; z-index: 6000; display: none; opacity: 0; background: transparent; align-items: center; justify-content: center; transition: opacity 0.4s ease; pointer-events: auto; }
        .map-glass-container { width: 100%; height: 100%; position: relative; background: transparent; overflow: hidden; transform: scale(0.95); transition: transform 0.4s ease; }
        .close-map { position: absolute; top: 20px; right: 25px; color: var(--bio-high); font-size: 3rem; cursor: pointer; z-index: 6001; font-weight: bold; text-shadow: 0 0 15px #000; line-height: 1;}
        #map-iframe { width: 100%; height: 100%; border: none; background: transparent; }
    </style>
</head>
<body spellcheck="false" translate="no">

<div id="kraken-lander">
    <div class="lander-card">
        <div style="font-size: 0.7rem; letter-spacing: 5px; margin-bottom: 25px; color: var(--bio-high);">SYSTEM READY</div>
        <a href="https://invite.kraken.com/JDNW/kkw3ryqs" target="_blank" class="kraken-btn">CLAIM 200 CAD BTC REWARD</a>
        <button class="btn-core" onclick="ignite()">INITIALIZE OLYMPUS</button>
    </div>
</div>

<div id="ui-layer">
    <header>
        <h1>OLYMPUS | GRAND MULTIVERSE</h1>
        <div id="cart-trigger" onclick="toggleCart(true)">
            <div class="cart-icon-wrapper">🛒<div id="visual-stack"></div></div>
            <span>MANIFEST (<span id="cart-count">0</span>)</span>
        </div>
    </header>

    <div id="store-grid"></div>

    <div id="hud-center">
        <div id="eclipse-alert" class="alert-box">TOTAL SOLAR ECLIPSE</div>
    </div>

    <div>
        <div id="store-pagination">
            <button id="btn-prev" class="btn-page" onclick="changePage(-1)">&#9664; PREV</button>
            <span id="page-indicator">[ PAGE 1 / 1 ]</span>
            <button id="btn-next" class="btn-page" onclick="changePage(1)">NEXT &#9654;</button>
        </div>
        
        <footer>
            <button class="btn-core" onclick="window.location.href='mailto:stakeme10000@gmail.com?subject=Olympus%20Custom%20Design'">CUSTOM DESIGN</button>
            <button class="btn-core" onclick="window.open('https://hermes-landing-nu.vercel.app/', '_blank')">ONLINE MALL</button>
            <button class="btn-core" onclick="window.open('https://nexusvortex.ca', '_blank')">NEXUS VORTEX</button>
            <button class="btn-core" id="viewport-btn" onclick="toggleViewport()">VIEWPORT 🪐</button>
        </footer>
    </div>
</div>

<div id="side-cart">
    <div style="padding:20px; border-bottom:1px solid var(--bio-high); display:flex; justify-content:space-between; align-items: center;">
        <span style="color:var(--bio-high); letter-spacing: 2px;">CART MANIFEST</span>
        <span onclick="toggleCart(false)" style="cursor:pointer; font-size: 1.5rem; color: var(--bio-high);">×</span>
    </div>
    <div id="cart-items" style="padding:20px; font-size:0.75rem; color: #fff; overflow-y: auto; height: calc(100% - 180px);"></div>
    <div style="position:absolute; bottom:20px; width:100%;">
        <a href="https://buy.stripe.com/4gMaEWdE3dha4GUgBAcIE01" class="pay-link" style="background:#fff; color:#000;" target="_blank">STRIPE SECURE</a>
        <a href="https://nowpayments.io/payment/?iid=6087329696" class="pay-link" style="background:var(--fire); color:#fff;" target="_blank">CRYPTO CHECKOUT</a>
    </div>
</div>

<div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span class="close-modal" onclick="closeModal()">×</span>
        <div id="modal-img-container" style="padding:15px;"></div>
        <div style="padding:0 20px;">
            <div id="modal-title" style="color:var(--bio-high); font-size:0.8rem; margin-bottom:10px; text-align:center;"></div>
            <div class="size-grid">
                <button class="size-btn" onclick="selectSize(this, 'S')">S</button>
                <button class="size-btn" onclick="selectSize(this, 'M')">M</button>
                <button class="size-btn" onclick="selectSize(this, 'L')">L</button>
                <button class="size-btn" onclick="selectSize(this, 'XL')">XL</button>
                <button class="size-btn" onclick="selectSize(this, '2XL')">2XL</button>
                <button class="size-btn" onclick="selectSize(this, '3XL')">3XL</button>
            </div>
            <button class="btn-core" style="width:100%; margin-top: 10px; background:var(--bio-high); color:#000;" onclick="addToCart()">UPLOAD TO MANIFEST</button>
        </div>
    </div>
</div>

<div id="map-holoframe">
    <div id="kombat-tower"></div>
    
    <div class="map-glass-container" id="map-glass">
        <span class="close-map" onclick="closeMapHoloframe()">×</span>
        <iframe id="map-iframe" allowtransparency="true" allow="geolocation; autoplay; microphone" src=""></iframe>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script>
    // --- GLOBAL STATE ---
    window.eclipseIntensity = 8; // Global variable for Three.js to read
    window.viewportActive = false;
    
    let allProducts = [], cart = [], selectedSize = null, activeProduct = null;
    let currentPage = 1;
    const itemsPerPage = 8;

    // --- VOX ENGINE ---
    let kahnVoice = null;
    function loadVoices() {
        const voices = window.speechSynthesis.getVoices();
        kahnVoice = voices.find(v => v.name.includes('Male') || v.name.includes('David') || v.name.includes('Guy')) || voices[0];
    }
    // Lock in the voice when they load
    window.speechSynthesis.onvoiceschanged = loadVoices;

    function sHaoKahnSpeak(text) {
        window.speechSynthesis.cancel();
        const msg = new SpeechSynthesisUtterance(text);
        if (kahnVoice) msg.voice = kahnVoice;
        msg.pitch = 0.30;
        msg.rate = 0.85;
        msg.volume = 1.0;
        window.speechSynthesis.speak(msg);
    }

    // --- NAVIGATION BRIDGE ---
    window.addEventListener('message', (event) => {
        if (event.data.type === 'NAV_START') {
            sHaoKahnSpeak("CHOOSE YOUR DESTINY. DRIVE!");
            updateKombatTower("ROUND 1: START");
        } else if (event.data.type === 'NAV_TURN') {
            sHaoKahnSpeak(event.data.text);
            updateKombatTower(event.data.text);
        } else if (event.data.type === 'NAV_ARRIVE') {
            sHaoKahnSpeak("FLAWLESS VICTORY. DESTINATION REACHED.");
            updateKombatTower("FATALITY");
        }
    });

    window.updateKombatTower = (instruction) => {
        const tower = document.getElementById('kombat-tower');
        tower.style.display = 'flex';
        const step = document.createElement('div');
        step.className = 'tower-step active';
        step.innerText = instruction;
        document.querySelectorAll('.tower-step').forEach(s => s.classList.remove('active'));
        tower.appendChild(step);
        if(tower.children.length > 5) tower.removeChild(tower.firstChild);
    };

    // --- ECLIPSE LOGIC ---
    let eclipseTimer;
    function triggerEclipse() {
        const alertBox = document.getElementById('eclipse-alert');
        const isCurrentlyActive = alertBox.classList.contains('active');
        
        if (!isCurrentlyActive) {
            alertBox.classList.add('active');
            window.eclipseIntensity = 0.1; // Tell Three.js to dim the sun
            sHaoKahnSpeak("THE ELDERS HAVE FORETOLD... TOTAL ECLIPSE.");
        } else {
            alertBox.classList.remove('active');
            window.eclipseIntensity = 8; // Bring the light back
        }
    }

    // --- APP LIFECYCLE ---
    window.ignite = () => {
        document.getElementById('kraken-lander').style.transform = 'translateY(-100%)';
        setTimeout(() => {
            document.getElementById('ui-layer').style.opacity = '1';
            document.getElementById('store-grid').style.display = 'grid';
            document.getElementById('store-pagination').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('store-grid').style.opacity = '1';
                document.getElementById('store-pagination').style.opacity = '1';
            }, 50);
            fetchStore();
            
            // Start Eclipse Cycle 30 seconds after system ignition
            eclipseTimer = setInterval(triggerEclipse, 30000); 
        }, 500);
    };

    async function fetchStore() {
        try {
            // Using alias to protect identity
            const res = await fetch('/api/nexus-core-2.js');
            const data = await res.json();
            allProducts = data.products || [];
            renderGrid();
        } catch (e) { renderGrid(); }
    }

    function renderGrid() {
        const grid = document.getElementById('store-grid');
        const totalPages = Math.ceil(allProducts.length / itemsPerPage) || 1;
        const startIndex = (currentPage - 1) * itemsPerPage;
        const currentItems = allProducts.slice(startIndex, startIndex + itemsPerPage);

        grid.innerHTML = currentItems.map(p => `
            <div class="card" onclick="openModal('${p.name.replace(/'/g, "\\'")}', '${p.images[0]}')">
                <img src="${p.images[0]}" loading="lazy">
                <div class="grid-label">${p.name.split('Prompt:')[1] || p.name}</div>
            </div>`).join('');
        document.getElementById('page-indicator').innerText = `[ PAGE ${currentPage} / ${totalPages} ]`;
    }

    window.toggleViewport = () => {
        window.viewportActive = !window.viewportActive;
        if(window.toggleOrbitalControls) window.toggleOrbitalControls(window.viewportActive);
        document.getElementById('store-grid').style.display = window.viewportActive ? 'none' : 'grid';
        document.getElementById('store-pagination').style.display = window.viewportActive ? 'none' : 'flex';
        document.getElementById('viewport-btn').innerText = window.viewportActive ? "EXIT VIEWPORT 🪐" : "VIEWPORT 🪐";
    };

    window.openModal = (name, img) => {
        activeProduct = { name, img }; 
        document.getElementById('modal-title').innerText = name;
        document.getElementById('modal-img-container').innerHTML = `<img src="${img}" style="width:100%; mix-blend-mode:screen;">`;
        document.getElementById('modal-overlay').style.display = 'flex';
    };

    window.closeModal = () => document.getElementById('modal-overlay').style.display = 'none';
    window.toggleCart = (show) => document.getElementById('side-cart').classList.toggle('open', show);

    window.openMap = () => {
        const frame = document.getElementById('map-holoframe');
        document.getElementById('map-iframe').src = "https://olympus-map-node.vercel.app/";
        frame.style.display = 'flex';
        setTimeout(() => { 
            frame.style.opacity = '1'; 
            sHaoKahnSpeak("WELCOME TO THE ARENA.");
        }, 50);
    };

    window.closeMapHoloframe = () => {
        const frame = document.getElementById('map-holoframe');
        frame.style.opacity = '0';
        document.getElementById('kombat-tower').style.display = 'none';
        document.getElementById('kombat-tower').innerHTML = '';
        setTimeout(() => { frame.style.display = 'none'; document.getElementById('map-iframe').src = ""; }, 400);
    };
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    // --- ENGINE INITIALIZATION ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 60000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.toneMapping = THREE.ReinhardToneMapping;
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.enabled = false;
    camera.position.set(900, 2500, 6500);
    controls.target.set(900, 0, 0);

    const loader = new THREE.TextureLoader();
    const assetPath = './assets/';

    // --- BLOOM ---
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, camera));
    const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.6, 0.4, 0.85);
    composer.addPass(bloomPass);

    // --- BODIES ---
    const sunTex = loader.load(assetPath + '8k_sun.jpg');
    const sun = new THREE.Mesh(new THREE.SphereGeometry(450, 64, 64), new THREE.MeshBasicMaterial({ map: sunTex }));
    scene.add(sun);

    const sunLight = new THREE.PointLight(0xffffff, 8, 30000);
    scene.add(sunLight);

    const earthOrbit = new THREE.Group();
    scene.add(earthOrbit);

    const earthTex = loader.load(assetPath + '8k_earth_nightmap.jpg');
    const earth = new THREE.Mesh(
        new THREE.SphereGeometry(150, 64, 64),
        new THREE.MeshStandardMaterial({ map: earthTex, emissive: 0xffffff, emissiveMap: earthTex, emissiveIntensity: 0.6 })
    );
    earth.position.x = 2200;
    earthOrbit.add(earth);

    const moonOrbit = new THREE.Group();
    earth.add(moonOrbit);
    const moonTex = loader.load(assetPath + '8k_moon.jpg');
    const moon = new THREE.Mesh(new THREE.SphereGeometry(45, 32, 32), new THREE.MeshStandardMaterial({ map: moonTex }));
    moon.position.x = 450;
    moonOrbit.add(moon);

    // --- INTERACTION ---
    let isMoving = false;
    let startPos = new THREE.Vector2();

    renderer.domElement.addEventListener('pointerdown', (e) => { startPos.set(e.clientX, e.clientY); isMoving = false; });
    renderer.domElement.addEventListener('pointermove', (e) => { if(startPos.distanceTo(new THREE.Vector2(e.clientX, e.clientY)) > 10) isMoving = true; });
    renderer.domElement.addEventListener('pointerup', (e) => {
        if (!isMoving && window.viewportActive) { window.openMap(); }
    });

    const clock = new THREE.Clock();
    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.001;
        earth.rotation.y += 0.003;
        moonOrbit.rotation.y += 0.005;
        earthOrbit.rotation.y += 0.0005;
        
        // Dims the sun when the global eclipse variable triggers
        sunLight.intensity = THREE.MathUtils.lerp(sunLight.intensity, window.eclipseIntensity, 0.05);

        controls.update();
        composer.render();
    }
    animate();

    // Expose control toggle to the global window
    window.toggleOrbitalControls = (enable) => { controls.enabled = enable; };
</script>
</body>
</html>
