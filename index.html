<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OLYMPIAN // SOLAR CORE</title>
    <style>
        :root { 
            --neon-cyan: #00f2ff;
            --ui-bg: rgba(0, 0, 0, 0.9);
        }

        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #000; font-family: 'Courier New', monospace; 
            color: var(--neon-cyan); overflow: hidden; 
        }
        
        canvas { position: fixed; top: 0; left: 0; z-index: 0; }
        .ui-hidden { display: none !important; }

        /* --- LAYER 1: KRAKEN LANDING --- */
        #landing-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 5000; background: rgba(0,0,0,0.85);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(15px); transition: 0.8s ease;
        }

        .kraken-card { width: 90%; max-width: 400px; text-align: center; }
        .btn-action {
            display: block; background: var(--neon-cyan); color: #000;
            padding: 20px; font-weight: bold; text-decoration: none;
            letter-spacing: 2px; border: none; box-shadow: 0 0 20px var(--neon-cyan);
            margin-bottom: 15px; text-transform: uppercase; cursor: pointer;
        }
        #enter-btn {
            background: transparent; border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan); width: 100%; padding: 12px; cursor: pointer;
            letter-spacing: 3px; font-size: 0.7rem;
        }

        /* --- LAYER 2: OLYMPIAN STORE UI --- */
        header { 
            position: fixed; top: 0; width: 100%; z-index: 100; height: 70px; 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 30px; background: var(--ui-bg); border-bottom: 1px solid var(--neon-cyan); 
            box-sizing: border-box;
        }

        #store-grid { 
            position: relative; z-index: 10; display: grid;
            grid-template-columns: repeat(2, 1fr); gap: 20px; 
            width: 90%; margin: 90px auto 100px auto; 
            height: calc(100vh - 190px); overflow-y: auto; scrollbar-width: none;
        }

        .product-card { 
            background: rgba(0, 242, 255, 0.05); border: 1px solid rgba(0, 242, 255, 0.2);
            padding: 15px; text-align: center; cursor: pointer; backdrop-filter: blur(5px);
        }
        .product-card img { width: 100%; height: auto; mix-blend-mode: screen; }

        footer {
            position: fixed; bottom: 0; width: 100%; height: 90px;
            background: var(--ui-bg); z-index: 100; display: flex; 
            align-items: center; justify-content: space-between;
            border-top: 1px solid var(--neon-cyan); padding: 0 30px; box-sizing: border-box;
        }

        .btn-ui { border: 1px solid var(--neon-cyan); background: transparent; color: var(--neon-cyan); padding: 10px 20px; cursor: pointer; text-decoration: none; font-size: 0.7rem; }

        /* --- MODAL --- */
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 6000; background: rgba(0,0,0,0.9); display: none; align-items: center; justify-content: center; }
        .modal-box { width: 85%; max-width: 350px; border: 1px solid var(--neon-cyan); background: #000; padding: 30px; text-align: center; }
        .size-row { display: flex; justify-content: center; gap: 10px; margin: 20px 0; }
        .size-btn { border: 1px solid var(--neon-cyan); color: #fff; background: none; padding: 10px 15px; cursor: pointer; }
        .size-btn.active { background: var(--neon-cyan); color: #000; }
    </style>
</head>
<body>

<div id="landing-overlay">
    <div class="kraken-card">
        <a href="https://invite.kraken.com/JDNW/2yyr243k" target="_blank" class="btn-action">CLAIM 200 CAD BTC</a>
        <button id="enter-btn" onclick="dismissLanding()">ENTER SOLAR CORE</button>
    </div>
</div>

<header id="ui-header" class="ui-hidden">
    <div style="letter-spacing: 5px; font-weight: bold;">OLYMPIAN // MAIN</div>
    <div id="cart-trigger">MANIFEST (<span id="cart-count">0</span>)</div>
</header>

<div id="store-grid" class="ui-hidden">
    <div class="product-card" onclick="openModal('OLYMPIAN V1', './assets/1000000145.jpg')">
        <img src="./assets/1000000145.jpg">
        <div style="font-size:0.6rem; margin-top:10px; letter-spacing: 2px;">ASSET_145_HOODIE</div>
    </div>
    <div class="product-card" onclick="openModal('OLYMPIAN V2', './assets/1000000147.jpg')">
        <img src="./assets/1000000147.jpg">
        <div style="font-size:0.6rem; margin-top:10px; letter-spacing: 2px;">ASSET_147_HOODIE</div>
    </div>
</div>

<footer id="ui-footer" class="ui-hidden">
    <a href="mailto:stakeme10000@gmail.com" class="btn-ui">CUSTOM DESIGN</a>
    <button class="btn-ui" onclick="toggleSim()">INTERACTIVE VIEWPORT 🪐</button>
</footer>

<div id="modal" onclick="closeModal()">
    <div class="modal-box" onclick="event.stopPropagation()">
        <div id="modal-title" style="letter-spacing: 3px;">SELECT SIZE</div>
        <div class="size-row">
            <button class="size-btn" onclick="setSize(this)">S</button>
            <button class="size-btn" onclick="setSize(this)">M</button>
            <button class="size-btn" onclick="setSize(this)">L</button>
            <button class="size-btn" onclick="setSize(this)">XL</button>
        </div>
        <button class="btn-action" style="width:100%; font-size: 0.8rem;" onclick="addToCart()">UPLOAD TO MANIFEST</button>
    </div>
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/" } }
</script>

<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    // --- LAYER 3: THE SOLAR CORE ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 15000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enabled = false;
    camera.position.set(0, 1200, 2500);

    const texLoader = new THREE.TextureLoader();
    const path = './assets/';

    // Space Environment
    const starGeo = new THREE.SphereGeometry(9000, 64, 64);
    const starMat = new THREE.MeshBasicMaterial({ map: texLoader.load(path + '1000000141.jpg'), side: THREE.BackSide });
    scene.add(new THREE.Mesh(starGeo, starMat));

    const planets = [];
    const sun = new THREE.Mesh(
        new THREE.SphereGeometry(220, 64, 64), 
        new THREE.MeshBasicMaterial({ map: texLoader.load(path + '1000000142.jpg') })
    );
    scene.add(sun);

    function createPlanet(radius, texture, distance, speed, atmosTex = null, ringTex = null) {
        const pivot = new THREE.Group();
        scene.add(pivot);

        const mesh = new THREE.Mesh(
            new THREE.SphereGeometry(radius, 64, 64), 
            new THREE.MeshStandardMaterial({ map: texLoader.load(path + texture) })
        );
        mesh.position.x = distance;
        pivot.add(mesh);

        if(atmosTex) {
            const atmos = new THREE.Mesh(
                new THREE.SphereGeometry(radius + 2, 64, 64), 
                new THREE.MeshStandardMaterial({ map: texLoader.load(path + atmosTex), transparent: true, opacity: 0.35 })
            );
            mesh.add(atmos); // Wrapped to planet
        }

        if(ringTex) {
            const ring = new THREE.Mesh(
                new THREE.RingGeometry(radius * 1.4, radius * 2.4, 64), 
                new THREE.MeshBasicMaterial({ map: texLoader.load(path + ringTex), side: THREE.DoubleSide, transparent: true })
            );
            ring.rotation.x = Math.PI / 2;
            mesh.add(ring); // Wrapped to planet
        }

        const data = { pivot, mesh, speed };
        planets.push(data);
        return data;
    }

    // Planetary Alignment
    createPlanet(14, '1000000128.jpg', 450, 0.012); // Mercury
    createPlanet(26, '1000000129.jpg', 650, 0.009, '1000000130.jpg'); // Venus
    const earth = createPlanet(30, '1000000138.jpg', 900, 0.007, '1000000135.jpg'); // Earth (Night + Clouds)
    
    const moon = new THREE.Mesh(
        new THREE.SphereGeometry(7, 32, 32), 
        new THREE.MeshStandardMaterial({ map: texLoader.load(path + '1000000143.jpg') })
    );
    moon.position.x = 65;
    earth.mesh.add(moon); // Moon orbits Earth mesh

    createPlanet(20, '1000000131.jpg', 1200, 0.006); // Mars
    createPlanet(80, '1000000132.jpg', 1600, 0.003); // Jupiter
    createPlanet(70, '1000000133.jpg', 2000, 0.002, null, '1000000134.png'); // Saturn + Rings
    createPlanet(55, '1000000136.jpg', 2450, 0.001); // Neptune

    // Dynamic Lighting
    const sunLight = new THREE.PointLight(0xffffff, 3, 10000);
    scene.add(sunLight);
    scene.add(new THREE.AmbientLight(0xffffff, 0.15));

    function animate() {
        requestAnimationFrame(animate);
        sun.rotation.y += 0.0015;
        planets.forEach(p => {
            p.pivot.rotation.y += p.speed;
            p.mesh.rotation.y += 0.004;
        });
        if(controls.enabled) controls.update();
        renderer.render(scene, camera);
    }
    animate();

    // INTERFACE LOGIC
    window.dismissLanding = () => {
        document.getElementById('landing-overlay').style.opacity = '0';
        setTimeout(() => {
            document.getElementById('landing-overlay').classList.add('ui-hidden');
            ['ui-header', 'store-grid', 'ui-footer'].forEach(id => document.getElementById(id).classList.remove('ui-hidden'));
        }, 800);
    };

    window.toggleSim = () => {
        const active = !controls.enabled;
        controls.enabled = active;
        ['ui-header', 'store-grid'].forEach(id => document.getElementById(id).classList.toggle('ui-hidden', active));
    };

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>

<script>
    let manifestCount = 0;
    function openModal(title) { document.getElementById('modal').style.display = 'flex'; }
    function closeModal() { document.getElementById('modal').style.display = 'none'; }
    function setSize(btn) {
        document.querySelectorAll('.size-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }
    function addToCart() {
        manifestCount++;
        document.getElementById('cart-count').innerText = manifestCount;
        closeModal();
    }
</script>
</body>
</html>
