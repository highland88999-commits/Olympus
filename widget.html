<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXUSVORTEX | TERMINAL</title>
    <style>
        :root { --neon: #00f2ff; --bg: #000; --card-bg: rgba(0, 242, 255, 0.03); }
        
        body { 
            margin: 0; padding: 0; background: transparent; font-family: 'Courier New', monospace; 
            color: white; overflow: hidden; border: 1px solid var(--neon); border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); display: flex; flex-direction: column; height: 100vh;
            box-sizing: border-box;
        }

        /* WIDGET HEADER */
        .widget-header { 
            display: flex; justify-content: space-between; padding: 12px 15px; 
            border-bottom: 1px solid rgba(0, 242, 255, 0.3); align-items: center; background: #001a33;
        }
        .brand { 
            font-size: 0.85rem; font-weight: bold; color: var(--neon); letter-spacing: 3px; 
            text-decoration: none; text-shadow: 0 0 8px var(--neon);
        }
        .shop-btn { 
            font-size: 0.65rem; color: #000; background: var(--neon); padding: 6px 12px; 
            border-radius: 4px; text-decoration: none; font-weight: bold; letter-spacing: 1px;
            transition: 0.3s; box-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }
        .shop-btn:hover { background: #fff; box-shadow: 0 0 15px #fff; }

        /* HORIZONTAL SCROLLING CAROUSEL */
        .carousel-container {
            display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 15px; padding: 15px;
            scrollbar-width: none; /* Firefox */ flex-grow: 1; align-items: center; background: rgba(0,0,0,0.8);
        }
        .carousel-container::-webkit-scrollbar { display: none; /* Chrome/Safari */ }
        
        .card {
            flex: 0 0 140px; scroll-snap-align: start; background: var(--card-bg); border: 1px solid rgba(0, 242, 255, 0.3);
            border-radius: 6px; padding: 15px 10px; text-decoration: none; color: white; text-align: center;
            transition: 0.3s; display: flex; flex-direction: column; justify-content: space-between; height: 180px;
            backdrop-filter: blur(5px);
        }
        .card:hover { border-color: var(--neon); box-shadow: inset 0 0 15px rgba(0, 242, 255, 0.2); transform: translateY(-3px); }
        .card img { width: 100%; height: 110px; object-fit: contain; mix-blend-mode: screen; filter: drop-shadow(0 0 5px var(--neon)); }
        
        .card-title { 
            font-size: 0.6rem; text-transform: uppercase; margin-top: 10px; 
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff;
        }
        .view-txt { font-size: 0.55rem; color: var(--neon); margin-top: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div class="widget-header">
        <a href="https://nexusvortex.ca" target="_blank" class="brand">NEXUSVORTEX</a>
        <a href="https://hermes-landing-nu.vercel.app/" target="_blank" class="shop-btn">ENTER MALL</a>
    </div>

    <div class="carousel-container" id="carousel">
        <div style="font-size: 0.7rem; color: var(--neon); margin: auto; text-align: center;">SYNCHRONIZING MANIFEST...</div>
    </div>

    <script>
        async function loadWidgetData() {
            const container = document.getElementById('carousel');
            try {
                // Fetching from the Olympus repo's own API
                const res = await fetch('/api/artemis-2.js');
                const data = await res.json();
                const products = data.products || [];
                
                renderCarousel(products.slice(0, 10)); // Display the first 10 items
            } catch (e) {
                console.error("Widget Sync Failed", e);
                container.innerHTML = `<div style="color:#ff0033; margin:auto; font-size:0.7rem;">UPLINK SEVERED</div>`;
            }
        }

        function renderCarousel(items) {
            const container = document.getElementById('carousel');
            container.innerHTML = items.map(p => {
                const cleanName = p.name.split('Prompt:')[1] || p.name;
                return `
                <a href="https://hermes-landing-nu.vercel.app/" target="_blank" class="card">
                    <img src="${p.images[0]}" alt="${cleanName}" loading="lazy">
                    <div>
                        <div class="card-title">${cleanName}</div>
                        <div class="view-txt">VIEW ASSET ►</div>
                    </div>
                </a>`;
            }).join('');
        }

        loadWidgetData();
    </script>
</body>
</html>
